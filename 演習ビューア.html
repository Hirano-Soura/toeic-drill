<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOEIC デイリー演習ビューア</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --ink:#1f2430; --sub:#6b7280;
    --accent:#2563eb; --ok:#16a34a; --ng:#dc2626; --line:#e5e7eb;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7}
  header{background:var(--card);border-bottom:1px solid var(--line);padding:14px 20px;position:sticky;top:0;z-index:5}
  header h1{margin:0;font-size:18px}
  #tabs{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tab{border:1px solid var(--line);background:#fff;border-radius:16px;padding:4px 12px;font-size:13px;cursor:pointer}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  main{max-width:860px;margin:0 auto;padding:20px}
  .meta{font-size:13px;color:var(--sub);margin:4px 0 14px}
  .badge{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:10px;padding:1px 10px;font-size:12px;margin-right:6px}
  details.lecture{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-bottom:18px}
  details.lecture summary{cursor:pointer;font-weight:600}
  .lec h2{font-size:17px;border-bottom:2px solid var(--accent);padding-bottom:4px}
  .lec h3{font-size:15px;color:#1e40af}
  .lec code{background:#f3f4f6;border-radius:4px;padding:1px 5px;font-family:Consolas,monospace;font-size:0.92em}
  .lec ul{padding-left:22px}
  section.qsec{margin-bottom:26px}
  section.qsec>h2{font-size:16px;background:var(--accent);color:#fff;border-radius:8px;padding:6px 14px}
  .passage{background:var(--card);border-left:4px solid #94a3b8;border-radius:8px;padding:12px 16px;margin:10px 0;white-space:pre-wrap;font-size:14.5px}
  .passage-ja{color:var(--sub);font-size:13px;white-space:pre-wrap;margin:6px 0 12px;display:none;padding:0 16px}
  .pjbtn{font-size:12px;margin:0 0 4px}
  .q{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:12px 0}
  .q .stem{font-weight:600;margin-bottom:8px;white-space:pre-wrap}
  .choices{display:grid;gap:6px}
  .choice{text-align:left;border:1px solid var(--line);background:#fafafa;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:14.5px;font-family:inherit}
  .choice:hover{border-color:var(--accent)}
  .choice.correct{background:#dcfce7;border-color:var(--ok);font-weight:600}
  .choice.wrong{background:#fee2e2;border-color:var(--ng)}
  .choice:disabled{cursor:default;opacity:.95}
  .expl{display:none;margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;font-size:14px}
  .expl .ja{color:#374151;margin-bottom:6px}
  .expl .ex{color:#1f2937;white-space:pre-wrap}
  .reveal{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;margin-top:8px}
  #scorebar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);padding:8px 20px;font-size:14px;display:flex;gap:18px;align-items:center}
  #scorebar button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 12px;cursor:pointer}
  .empty{color:var(--sub);text-align:center;margin-top:60px}
  small.src{color:var(--sub)}
</style>
</head>
<body>
<header>
  <h1>TOEIC デイリー演習ビューア</h1>
  <div id="tabs"></div>
</header>
<main id="content"><p class="empty">読み込み中…</p></main>
<div id="scorebar">
  <span id="score">正答 0 / 解答済 0</span>
  <button onclick="renderDay(currentIdx)">この回をリセット</button>
</div>
<script>
window.__DRILLS = [];
window.__addDrill = function(d){ window.__DRILLS.push(d); };

// 2026-07-17以降の日付を総当たりで読み込む（存在しない日は無視される）
function probe(){
  var start = new Date(2026, 6, 17); // 2026-07-17
  var end = new Date(); end.setDate(end.getDate()+1);
  var promises = [];
  for(var d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    var y=d.getFullYear(), m=('0'+(d.getMonth()+1)).slice(-2), dd=('0'+d.getDate()).slice(-2);
    var src='演習データ/TOEIC_'+y+'-'+m+'-'+dd+'.js';
    promises.push(new Promise(function(res){
      var s=document.createElement('script');
      s.src=src; s.onload=res; s.onerror=res;
      document.head.appendChild(s);
    }));
  }
  return Promise.all(promises);
}

var days=[], currentIdx=0, answered=0, correct=0;

function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 最小限のMarkdown描画（見出し/太字/コード/箇条書き/段落）
function md(t){
  var lines=String(t).split('\n'), out=[], inUl=false;
  lines.forEach(function(l){
    var m;
    if((m=l.match(/^###\s+(.*)/))){ if(inUl){out.push('</ul>');inUl=false;} out.push('<h3>'+inline(m[1])+'</h3>'); }
    else if((m=l.match(/^##\s+(.*)/))){ if(inUl){out.push('</ul>');inUl=false;} out.push('<h2>'+inline(m[1])+'</h2>'); }
    else if((m=l.match(/^#\s+(.*)/))){ if(inUl){out.push('</ul>');inUl=false;} out.push('<h2>'+inline(m[1])+'</h2>'); }
    else if((m=l.match(/^\s*[-*]\s+(.*)/))){ if(!inUl){out.push('<ul>');inUl=true;} out.push('<li>'+inline(m[1])+'</li>'); }
    else if(l.trim()===''){ if(inUl){out.push('</ul>');inUl=false;} }
    else { if(inUl){out.push('</ul>');inUl=false;} out.push('<p>'+inline(l)+'</p>'); }
  });
  if(inUl)out.push('</ul>');
  return out.join('\n');
}
function inline(t){
  return esc(t)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}

function buildTabs(){
  var tabs=document.getElementById('tabs'); tabs.innerHTML='';
  days.forEach(function(d,i){
    var b=document.createElement('button');
    b.className='tab'+(i===currentIdx?' active':'');
    b.textContent=d.date.slice(5)+' '+(d.topicNo||'');
    b.onclick=function(){ currentIdx=i; buildTabs(); renderDay(i); };
    tabs.appendChild(b);
  });
}

function renderDay(idx){
  answered=0; correct=0; updateScore();
  var d=days[idx], c=document.getElementById('content');
  if(!d){ c.innerHTML='<p class="empty">まだ演習データがありません。次回のドリル実行後に表示されます。</p>'; return; }
  var h='<h1 style="font-size:20px;margin-bottom:2px">'+esc(d.topic)+'</h1>';
  h+='<div class="meta"><span class="badge">'+esc(d.field||'')+'</span><span class="badge">'+esc(d.topicNo||'')+'</span>'
    + esc(d.date)+' ／ 進捗 '+d.progressDone+' / '+d.progressTotal+'</div>';
  h+='<details class="lecture" open><summary>今日の解説</summary><div class="lec">'+md(d.lecture||'')+'</div></details>';
  (d.sections||[]).forEach(function(sec,si){
    h+='<section class="qsec"><h2>'+esc(sec.title)+'</h2>';
    (sec.groups||[]).forEach(function(g,gi){
      if(g.passage){
        h+='<div class="passage">'+esc(g.passage)+'</div>';
        if(g.passageJa){
          var pid='pj'+si+'_'+gi;
          h+='<button class="reveal pjbtn" onclick="var e=document.getElementById(\''+pid+'\');e.style.display=e.style.display===\'block\'?\'none\':\'block\'">本文の和訳を表示/隠す</button>';
          h+='<div class="passage-ja" id="'+pid+'">'+esc(g.passageJa)+'</div>';
        }
      }
      (g.items||[]).forEach(function(it,qi){
        var qid='q'+si+'_'+gi+'_'+qi;
        h+='<div class="q" id="'+qid+'"><div class="stem">'+esc(it.q)+'</div><div class="choices">';
        it.choices.forEach(function(ch,ci){
          h+='<button class="choice" data-q="'+qid+'" data-c="'+ci+'">'+String.fromCharCode(65+ci)+'. '+esc(ch)+'</button>';
        });
        h+='</div><button class="reveal" data-show="'+qid+'">解答・解説を見る</button>';
        h+='<div class="expl" id="'+qid+'_e">';
        if(it.ja) h+='<div class="ja">【和訳】'+esc(it.ja)+'</div>';
        h+='<div class="ex">'+esc(it.expl||'')+'</div></div></div>';
      });
    });
    h+='</section>';
  });
  c.innerHTML=h;

  var ANS={};
  (d.sections||[]).forEach(function(sec,si){(sec.groups||[]).forEach(function(g,gi){(g.items||[]).forEach(function(it,qi){ANS['q'+si+'_'+gi+'_'+qi]=it.answer;});});});

  c.querySelectorAll('.choice').forEach(function(btn){
    btn.onclick=function(){
      var qid=btn.dataset.q, ci=+btn.dataset.c, ans=ANS[qid];
      var box=document.getElementById(qid);
      if(box.dataset.done)return;
      box.dataset.done='1'; answered++;
      box.querySelectorAll('.choice').forEach(function(b){
        b.disabled=true;
        if(+b.dataset.c===ans)b.classList.add('correct');
      });
      if(ci===ans){correct++;}else{btn.classList.add('wrong');}
      document.getElementById(qid+'_e').style.display='block';
      updateScore();
    };
  });
  c.querySelectorAll('.reveal[data-show]').forEach(function(btn){
    btn.onclick=function(){
      var qid=btn.dataset.show, box=document.getElementById(qid), ans=ANS[qid];
      if(!box.dataset.done){
        box.dataset.done='1';
        box.querySelectorAll('.choice').forEach(function(b){b.disabled=true;if(+b.dataset.c===ans)b.classList.add('correct');});
      }
      document.getElementById(qid+'_e').style.display='block';
    };
  });
  window.scrollTo(0,0);
}

function updateScore(){
  document.getElementById('score').textContent='正答 '+correct+' / 解答済 '+answered;
}

probe().then(function(){
  days=window.__DRILLS.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  currentIdx=days.length?days.length-1:0;
