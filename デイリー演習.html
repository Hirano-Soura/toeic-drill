.q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:12px 0;

.opt .lt{font-weight:700;color:var(--accent);min-width:22px}

.opt.correct .lt{color:var(--ok)}
.opt.wrong{background:var(--ng-bg);border-color:var(--ng)}

date **needs** to submit two references.</code>（すべての候補者は照会先を2つ提出する必要があります）</li>\n<li><code>A number of complaints **have** been received.</code>（多くの苦情が寄せられています）</li>\n<li><code>Neither of the proposals **meets** our requirements.</code>（どちらの提案も要件を満たしていません）</li>\n</ul>\n<h3>4. TOEICでの狙われ方</h3>\n<p>Part5では「主語＋（長い修飾句）＋（　）＋…」という空所に、単数動詞・複数動詞の両方が選択肢に並びます。修飾句の中の名詞（直前の名詞）につい一致させたくなるよう設計されています。Part6では、前後の文の主語や時制と整合させる形で問われることもあります。</p>\n<h3>5. 間違えやすい点</h3>\n<ul>\n<li>直前の名詞に引っ張られる：<code>The quality of the products (is/are)</code> → 主語は quality＝<strong>is</strong>。</li>\n<li><code>Each / Every / -one / -body</code> を複数と誤認：常に<strong>単数</strong>。</li>\n<li><code>A number of</code>（複数）と <code>The number of</code>（単数）の取り違え。</li>\n<li>either A or B / neither A nor B は「近い方」に合わせる、という近接原則の失念。</li>\n<li>集合名詞をむやみに複数にする（TOEICは基本単数）。</li>\n</ul>\n<hr />", "items": [{"stem": "The list of approved vendors ______ updated every quarter.", "note": "", "options": {"A": "are", "B": "is", "C": "were", "D": "have been"}, "answer": "B", "explanation": "Q1. 正解 (B) is\n和訳：承認済みベンダーのリストは四半期ごとに更新されます。\n主語は The list（単数）で、of approved vendors は修飾句なので無視します。現在の習慣を表す現在形で単数の (B) is。(A) are・(C) were は複数/過去で不一致、(D) have been は主語が単数なので has been でなければ不可。", "review": false}, {"stem": "Neither the supervisor nor the technicians ______ available this afternoon.", "note": "", "options": {"A": "is", "B": "was", "C": "are", "D": "has been"}, "answer": "C", "explanation": "Q2. 正解 (C) are\n和訳：上司も技術者たちも今日の午後は手が空いていません。\nneither A nor B は近い方の主語 the technicians（複数）に一致します。よって are。(A) is・(B) was・(D) has been はいずれも単数扱いで近接原則に反します。", "review": false}, {"stem": "Each of the applicants ______ required to complete an online form.", "note": "", "options": {"A": "are", "B": "were", "C": "is", "D": "have"}, "answer": "C", "explanation": "Q3. 正解 (C) is\n和訳：応募者の各人はオンラインフォームの記入を求められます。\nEach of ～ は「各々」で常に単数。よって単数の is。(A) are・(B) were・(D) have は複数扱いで誤り。", "review": false}, {"stem": "A number of passengers ______ still waiting for the delayed flight.", "note": "", "options": {"A": "is", "B": "was", "C": "has been", "D": "are"}, "answer": "D", "explanation": "Q4. 正解 (D) are\n和訳：多くの乗客が遅延した便をまだ待っています。\nA number of ～ は「多くの～」で複数扱い。進行の意味に合う are still waiting。(A) is・(B) was・(C) has been は単数扱いで不一致。The number of なら単数になる点と対比して覚えます。", "review": false}, {"stem": "The committee ______ its final decision at the next meeting.", "note": "", "options": {"A": "announce", "B": "announces", "C": "are announcing", "D": "have announced"}, "answer": "B", "explanation": "Q5. 正解 (B) announces\n和訳：委員会は次の会議で最終決定を発表します。\n集合名詞 committee はTOEICでは通例ひとまとまりの単数。未来の予定を表す現在形で単数の announces。(A) announce は複数形の動詞、(C)(D) は複数扱いで不一致。", "review": false}, {"stem": "The new software allows users to work more ______.", "note": "", "options": {"A": "efficient", "B": "efficiency", "C": "efficiently", "D": "efficiencies"}, "answer": "C", "explanation": "解答：(C) efficiently\n和訳：新しいソフトウェアによって、利用者はより効率的に作業できます。\n動詞 work を修飾するので副詞 efficiently。(A) は形容詞、(B)(D) は名詞で、動詞を修飾できません。", "review": true}, {"stem": "All employees must obtain ______ before entering the laboratory.", "note": "", "options": {"A": "approve", "B": "approval", "C": "approved", "D": "approvingly"}, "answer": "B", "explanation": "解答：(B) approval\n和訳：全従業員は実験室に入る前に承認を得なければなりません。\n他動詞 obtain の目的語には名詞が必要。よって名詞 approval。(A) は動詞、(C) は過去分詞/形容詞、(D) は副詞で目的語になれません。", "review": true}, {"stem": "（補充｜文法：品詞の識別）The manager gave a ______ presentation to the investors.", "note": "", "options": {"A": "persuade", "B": "persuasion", "C": "persuasive", "D": "persuasively"}, "answer": "C", "explanation": "解答：(C) persuasive\n和訳：部長は投資家に説得力のあるプレゼンを行いました。\n名詞 presentation を修飾するので形容詞 persuasive。(A) 動詞、(B) 名詞、(D) 副詞は名詞を直接修飾できません。", "review": true}]}, {"file": "TOEIC_2026-07-05.md", "date": "2026-07-05", "title": "TOEIC(L&R) デイリー演習 — 2026-07-05（日）", "progress": "トピック進捗：全40トピック中 3個目（No.03 / 40）", "topic": "分野：文法／No.03 時制の基本（現在・過去・未来）", "explanation_html": "<h2>詳しい解説</h2>\n<h3>1. 要点</h3>\n<p>TOEICのPart5では、動詞の形そのものよりも「文中の時を示す語句」と時制を一致させられるかが問われます。next month・yesterday・currently のような副詞（句）が手がかりになるため、まず文中に時を示す語句を探し、それに動詞を合わせる、という手順を徹底します。</p>\n<h3>2. ルールと型</h3>\n<p><strong>(a) 現在形の用法</strong>\n- 習慣・反復動作：<code>The store opens at nine every day.</code>\n- 一般的事実・恒常的状態：<code>Water boils at 100 degrees Celsius.</code>\n- 確定したスケジュール・予定（未来のことでも現在形）：<code>The new policy goes into effect next month.</code></p>\n<p><strong>(b) 過去形の用法</strong>\n- 過去の一時点の動作・状態。yesterday・last week・ago・in 2019 などと共起：<code>Ms. Tanaka submitted the report yesterday afternoon.</code>\n- 完了形（has/have + 過去分詞）は「明確な過去の一時点を示す語句」とは共存できません。yesterdayがあれば過去形一択です。</p>\n<p><strong>(c) 未来表現</strong>\n- <code>will</code> + 動詞原形：予測・その場での決定・意志。\n- <code>be going to</code>：既に決まっている予定・根拠のある予測。\n- 現在進行形：近い未来の具体的な予定（<code>I am meeting the client tomorrow.</code>）。\n- 確定した時刻表・スケジュールは現在形でも未来を表せます（上記(a)参照）。</p>\n<p><strong>(d) 時・条件を表す副詞節では未来のことも現在形で表す</strong>\n<code>if / when / before / after / as soon as / once / unless</code> などで始まる副詞節の中では、未来の内容でも <code>will</code> を使わず現在形にします。ただし主節が未来のことであれば主節側は <code>will</code> を使います。\n- <code>If the shipment arrives late, please notify the customer.</code>（副詞節は現在形）\n- <code>The board will announce its decision as soon as the audit is completed.</code>（主節=will、副詞節=現在形）</p>\n<p><strong>(e) 現在進行形と現在形の違い（一時的 vs 恒常的）</strong>\n- 現在形：習慣・恒常的な事実。\n- 現在進行形：今まさに進行中、または一時的な状況。\n- <code>Currently, the factory is operating at full capacity due to high demand.</code>（一時的な事情＝due to high demand と相性が良い）</p>\n<h3>3. 例文（英語＋和訳）</h3>\n<ul>\n<li><code>The new policy goes into effect next month.</code>（新しい方針は来月から施行されます）</li>\n<li><code>Ms. Tanaka submitted the report yesterday afternoon.</code>（田中さんは昨日の午後に報告書を提出しました）</li>\n<li><code>If the shipment arrives late, please notify the customer immediately.</code>（発送が遅れた場合は、直ちに顧客に通知してください）</li>\n<li><code>The board will announce its decision as soon as the audit is completed.</code>（監査が完了次第、取締役会は決定を発表します）</li>\n</ul>\n<h3>4. TOEICでの狙われ方</h3>\n<p>Part5では、選択肢に同じ動詞の現在形・過去形・未来形・完了形が並び、文中の時を示す語句（next month, yesterday, currently, as soon as ~）と一致するものを選ばせる形式が定番です。副詞節（if/when/as soon as等）の中で <code>will</code> を選ばせようとする誤答が必ず紛れています。Part6では前後の文脈（過去の出来事の説明か、今後の予定の告知か）から時制を判断させる問題も出ます。</p>\n<h3>5. 間違えやすい点</h3>\n<ul>\n<li>if/when/as soon as などの副詞節内で未来のことをうっかり <code>will</code> にしてしまう（主節と副詞節を混同する）。</li>\n<li>yesterdayのような明確な過去の語句があるのに、完了形（has/have+過去分詞）を選んでしまう。</li>\n<li>currently・at the moment のような「一時的」を示す語があるのに、恒常的習慣を表す現在形を選んでしまう（進行形が適切な場面）。</li>\n<li>スケジュール表現（現在形で未来を表す用法）を知らず、未来だからと安易に <code>will</code> を選んでしまう。</li>\n</ul>\n<hr />", "items": [{"stem": "The new policy ______ into effect next month.", "note": "", "options": {"A": "goes", "B": "went", "C": "has gone", "D": "going"}, "answer": "A", "explanation": "Q1. 正解 (A) goes\n和訳：新しい方針は来月から施行されます。\nnext month という未来の語句ですが、確定したスケジュール・規定の発効は現在形で表せます。(B) went は過去、(C) has gone は完了形で不一致、(D) going は動詞として機能しません（is going などの形が必要）。", "review": false}, {"stem": "If the shipment ______ late, please notify the customer immediately.", "note": "", "options": {"A": "will arrive", "B": "arrives", "C": "arrived", "D": "is arriving"}, "answer": "B", "explanation": "Q2. 正解 (B) arrives\n和訳：発送が遅れた場合は、直ちに顧客に通知してください。\nif で始まる条件の副詞節の中では、未来のことでも現在形を使います。(A) will arrive は副詞節内でwillを使ってしまう典型的な誤り、(C) arrived は過去、(D) is arriving は進行形で不自然です。", "review": false}, {"stem": "Ms. Tanaka ______ the quarterly report yesterday afternoon.", "note": "", "options": {"A": "submits", "B": "submitted", "C": "will submit", "D": "has submitted"}, "answer": "B", "explanation": "Q3. 正解 (B) submitted\n和訳：田中さんは昨日の午後に報告書を提出しました。\nyesterday afternoon という明確な過去の一時点があるため過去形。(A) submits は現在、(C) will submit は未来で不一致、(D) has submitted は完了形で、明確な過去の時点を示す語句とは共存できません。", "review": false}, {"stem": "The board ______ its decision as soon as the audit is completed.", "note": "", "options": {"A": "will announce", "B": "announces", "C": "announced", "D": "is announcing"}, "answer": "A", "explanation": "Q4. 正解 (A) will announce\n和訳：監査が完了次第、取締役会は決定を発表します。\nas soon as 以下の副詞節は現在形（is completed）ですが、主節は未来の内容なので will を使います。(B)(C)(D) はいずれも主節の時制として不適切です。", "review": false}, {"stem": "Currently, the factory ______ at full capacity due to high demand.", "note": "", "options": {"A": "operated", "B": "will operate", "C": "is operating", "D": "operates"}, "answer": "C", "explanation": "Q5. 正解 (C) is operating\n和訳：現在、工場は高い需要のためフル稼働しています。\ncurrently と due to high demand（一時的な理由）から、一時的に進行中の状況を表す現在進行形が適切です。(D) operates は恒常的な習慣を表すため文意とややずれます。(A) operated は過去、(B) will operate は未来で不一致です。", "review": false}, {"stem": "The information in these reports ______ confidential.", "note": "", "options": {"A": "is", "B": "are", "C": "were", "D": "have been"}, "answer": "A", "explanation": "解答：(A) is\n和訳：これらの報告書に含まれる情報は機密です。\n主語は information（不可算名詞、常に単数扱い）。in these reports は修飾句なので無視します。(B)(C)(D) はいずれも複数扱いで不一致です。", "review": true}, {"stem": "Both the manager and her assistant ______ attending the seminar next week.", "note": "", "options": {"A": "is", "B": "are", "C": "was", "D": "has been"}, "answer": "B", "explanation": "解答：(B) are\n和訳：部長とそのアシスタントは、どちらも来週のセミナーに参加します。\n`both A and B` は常に複数扱い。(A)(C)(D) はいずれも単数扱いで不一致です。", "review": true}, {"stem": "（補充｜文法：品詞の識別）The committee reached a ______ agreement after lengthy negotiations.", "note": "", "options": {"A": "mutual", "B": "mutually", "C": "mutuality", "D": "mutualize"}, "answer": "A", "explanation": "解答：(A) mutual\n和訳：委員会は長時間の交渉の末、相互に合意しました。\n名詞 agreement を修飾するので形容詞 mutual が適切です。(B) は副詞、(C) は名詞、(D) は動詞で、名詞を直接修飾できません。", "review": true}]}, {"file": "TOEIC_2026-07-06.md", "date": "2026-07-06", "title": "TOEIC(L&R) デイリー演習 — 2026-07-06（月）", "progress": "トピック進捗：全40トピック中 4個目（No.04 / 40）", "topic": "分野：文法／No.04 完了形（現在完了・過去完了）", "explanation_html": "<h2>詳しい解説</h2>\n<h3>1. 要点</h3>\n<p>完了形は「ある時点までの動作・状態のつながり」を表す形です。TOEIC Part5では、文中の時を示す語句（since・for・already・yet・over the past ~ か、yesterday・ago・last month・in+具体的年か）を手がかりに、単純過去と現在完了のどちらが適切かを判断させる問題が頻出します。さらに、2つの過去の出来事の前後関係を示す過去完了（had + 過去分詞）も定番の出題対象です。</p>\n<h3>2. ルールと型</h3>\n<p><strong>(a) 現在完了の基本用法（have/has + 過去分詞）</strong>\n- 継続：ある過去の時点から現在まで続いている状態・動作。since（起点）・for（期間）と共起：<code>Mr. Sato has worked at this branch since 2015.</code>\n- 経験：ever・never・before と共起。\n- 完了・結果：already（肯定文）・yet（疑問文・否定文）・just と共起：<code>The company has already implemented the new policy.</code>\n- TOEIC頻出パターン：<code>over the past / over the last + 期間</code> は現在完了と相性が良い：<code>Sales have increased significantly over the past three months.</code></p>\n<p><strong>(b) 現在完了 vs 単純過去（最重要ポイント）</strong>\n- since / for / already / yet / just / so far / recently / over the past ~ → 現在完了\n- yesterday / ~ ago / last week・last month / in + 具体的な年 → 単純過去\n- 両者の時を示す語句は混在できません。<code>has worked yesterday</code> のような形はTOEICでは誤答として扱われます。</p>\n<p><strong>(c) 過去完了の基本用法（had + 過去分詞）</strong>\n- 「過去よりさらに前の過去」を表します。過去の基準点（単純過去で表現）よりも前に完了していた動作・状態を示すときに使います。\n- by the time / before / after / when / once などとともに、2つの過去の出来事の前後関係を明確にする文脈で使われます：<code>By the time the technician arrived, the machine had shut down completely.</code>\n- 基準点となる過去の出来事（arrived）は単純過去、それより前に起きたこと（had shut down）は過去完了、という組み合わせが基本形です。</p>\n<p><strong>(d) 主語との一致にも注意</strong>\n- 現在完了はhave/hasの選択で主語の数と一致させる必要があります（例：Each employee has ~ / The employees have ~）。完了形の問題でも主語と動詞の一致を同時に問われることがあります。</p>\n<h3>3. 例文（英語＋和訳）</h3>\n<ul>\n<li><code>Mr. Sato has worked at this branch since 2015.</code>（佐藤さんは2015年からこの支店で働いています）</li>\n<li><code>The company has already implemented the new policy.</code>（会社はすでに新方針を導入しました）</li>\n<li><code>Sales have increased significantly over the past three months.</code>（売上はここ3か月で大幅に増加しました）</li>\n<li><code>By the time the technician arrived, the machine had shut down completely.</code>（技術者が到着するまでに、機械は完全に停止していました）</li>\n<li><code>Ms. Chen had already left the office when the client called.</code>（クライアントが電話をかけてきたとき、チェンさんはすでにオフィスを出ていました）</li>\n</ul>\n<h3>4. TOEICでの狙われ方</h3>\n<p>Part5では、選択肢に同じ動詞の単純過去形・現在完了形・過去完了形が並び、文中の時を示す語句（since/for/already/yet vs yesterday/ago/last month、あるいはby the time/whenのような前後関係を示す語句）に一致するものを選ばせる形式が定番です。Part6でも、文脈から「すでに完了していたことか」「これから起きることか」を読み取り、完了形か単純形かを判断させる問題が出ます。</p>\n<h3>5. 間違えやすい点</h3>\n<ul>\n<li>since/forがあるのに単純過去を選んでしまう、逆にyesterday/agoがあるのに現在完了を選んでしまう。</li>\n<li>2つの過去の出来事の前後関係を無視して、両方とも単純過去にしてしまう（本来は過去完了が必要な場面）。</li>\n<li>主語の数（単数・複数）とhas/haveの一致を見落とす。</li>\n<li>already（肯定文）とyet（疑問文・否定文）の使い分けを誤る。</li>\n</ul>\n<hr />", "items": [{"stem": "Mr. Sato ______ at this branch since 2015.", "note": "", "options": {"A": "works", "B": "worked", "C": "has worked", "D": "is working"}, "answer": "C", "explanation": "Q1. 正解 (C) has worked\n和訳：佐藤さんは2015年からこの支店で働いています。\nsince 2015 は現在完了の起点を示す典型的な語句です。(A) works・(D) is workingは現在の状態を表すのみでsinceと文法的に共存できません。(B) workedのような単純過去もsinceとは共存できません。", "review": false}, {"stem": "The board ______ the merger proposal last month.", "note": "", "options": {"A": "has approved", "B": "approved", "C": "approves", "D": "had been approved"}, "answer": "B", "explanation": "Q2. 正解 (B) approved\n和訳：取締役会は先月、合併案を承認しました。\nlast month という明確な過去の一時点があるため単純過去が適切です。(A) has approvedは現在完了でlast monthと共存不可、(C) approvesは現在形で不一致、(D) had been approvedは過去完了受動態で、基準となるさらに後の過去の出来事がないため文脈上不自然です。", "review": false}, {"stem": "By the time the technician arrived, the machine ______ down completely.", "note": "", "options": {"A": "shuts", "B": "has shut", "C": "shut", "D": "had shut"}, "answer": "D", "explanation": "Q3. 正解 (D) had shut\n和訳：技術者が到着するまでに、機械は完全に停止していました。\nby the time は「基準となる過去の出来事より前に完了していたこと」を示す合図です。基準点（arrived）は単純過去なので、それより前の出来事は過去完了で表します。(C) shutは時系列の前後関係を示せず、(B) has shutは基準点が過去であるため時制が合わず、(A) shutsは現在形で不可です。", "review": false}, {"stem": "Sales figures ______ significantly over the past three months.", "note": "", "options": {"A": "increase", "B": "increased", "C": "have increased", "D": "will increase"}, "answer": "C", "explanation": "Q4. 正解 (C) have increased\n和訳：売上高はここ3か月で大幅に増加しました。\nover the past three months は現在完了と結びつく典型的な表現です。(A) increaseは恒常的事実を表す現在形で期間の継続とは不一致、(B) increasedは特定の過去の一時点を示す語句が必要でoverの継続期間とは合いません、(D) will increaseは未来で文意と逆です。", "review": false}, {"stem": "Ms. Chen ______ the office when the client called.", "note": "", "options": {"A": "leaves", "B": "left", "C": "had left", "D": "has left"}, "answer": "C", "explanation": "Q5. 正解 (C) had left\n和訳：クライアントが電話をかけてきたとき、チェンさんはすでにオフィスを出ていました。\nwhen the client called（単純過去）という過去の基準点よりも前に完了していた動作なので過去完了が適切です。(B) leftだと同時に起きたことのように読めてしまい前後関係が不明瞭になります。(A) leavesは現在形で不可、(D) has leftは基準点が過去のため時制が合いません。", "review": false}, {"stem": "Once the shipment ______ , the warehouse staff will begin unloading it.", "note": "", "options": {"A": "arrives", "B": "will arrive", "C": "arrived", "D": "is arriving"}, "answer": "A", "explanation": "解答：(A) arrives\n和訳：荷物が到着次第、倉庫スタッフは荷下ろしを始めます。\nonce で始まる時・条件の副詞節の中では、未来のことでも現在形を使います。(B) は副詞節内でwillを使ってしまう典型的な誤り、(C) 過去形は文意と合わず、(D) 進行形は不自然です。", "review": true}, {"stem": "The CEO ______ the merger during yesterday's press conference.", "note": "", "options": {"A": "announces", "B": "announced", "C": "has announced", "D": "will announce"}, "answer": "B", "explanation": "解答：(B) announced\n和訳：CEOは昨日の記者会見で合併を発表しました。\nyesterday's press conference という明確な過去の一時点があるため単純過去が適切です。(A) 現在形・(D) 未来は文意と不一致、(C) 現在完了はyesterdayと共存できません。", "review": true}, {"stem": "The manager gave a ______ explanation of the new procedure.", "note": "", "options": {"A": "clear", "B": "clearly", "C": "clarity", "D": "clarify"}, "answer": "A", "explanation": "解答：(A) clear\n和訳：マネージャーは新しい手順について明確な説明をしました。\n名詞 explanation を修飾するので形容詞 clear が適切です。(B) は副詞、(C) は名詞、(D) は動詞で、いずれも名詞を直接修飾できません。", "review": true}, {"stem": "Employees must submit the form ______ before the deadline.", "note": "", "options": {"A": "prompt", "B": "promptly", "C": "promptness", "D": "prompted"}, "answer": "B", "explanation": "解答：(B) promptly\n和訳：従業員は締め切り前に速やかに書類を提出しなければなりません。\n動詞 submit を修飾する副詞が必要です。(A) 形容詞、(C) 名詞、(D) 過去分詞/過去形はいずれも文法的に不適合です。", "review": true}, {"stem": "（補充｜文法：主語と動詞の一致）Each of the employees ______ required to complete the training by Friday.", "note": "", "options": {"A": "is", "B": "are", "C": "were", "D": "have been"}, "answer": "A", "explanation": "解答：(A) is\n和訳：従業員一人ひとりが、金曜日までにその研修を修了することが求められています。\n`Each of + 複数名詞` は単数扱いになります。(B)(C)(D) はいずれも複数扱いで不一致です。", "review": true}]}, {"file": "TOEIC_2026-07-07.md", "date": "2026-07-07", "title": "TOEIC(L&R) デイリー演習 2026-07-07", "progress": "トピック進捗：全40トピック中 5個目（No.05 / 40）", "topic": "分野：文法 | No.05", "explanation_html": "<h2>解説</h2>\n<h3>要点</h3>\n<p>受動態は「行為を受ける側」を主語に置く構文です。TOEICのPart 5では「能動態か受動態か」を問う問題が非常に多く出ます。空所の前後を見て「主語が行為をする側か、受ける側か」を素早く判断する力が求められます。</p>\n<hr />\n<h3>ルールと型</h3>\n<p><strong>基本形：</strong> be動詞 + 過去分詞（+ by 行為者）</p>\n<p>行為者（by句）はしばしば省略されます。</p>\n<table>\n<thead>\n<tr>\n<th>時制</th>\n<th>能動態</th>\n<th>受動態</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>現在</td>\n<td>processes</td>\n<td>is/are processed</td>\n</tr>\n<tr>\n<td>過去</td>\n<td>processed</td>\n<td>was/were processed</td>\n</tr>\n<tr>\n<td>未来</td>\n<td>will process</td>\n<td>will be processed</td>\n</tr>\n<tr>\n<td>現在完了</td>\n<td>has/have processed</td>\n<td>has/have been processed</td>\n</tr>\n<tr>\n<td>現在進行</td>\n<td>is/are processing</td>\n<td>is/are being processed</td>\n</tr>\n<tr>\n<td>助動詞</td>\n<td>should process</td>\n<td>should be processed</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3>例文（英語＋和訳）</h3>\n<ol>\n<li>\n<p><strong>The report was submitted by the manager yesterday.</strong>\n   → 報告書は昨日、マネージャーによって提出されました。\n   （基本の過去受動態）</p>\n</li>\n<li>\n<p><strong>New employees are trained by the HR department.</strong>\n   → 新入社員は人事部門によって研修されます。\n   （現在受動態）</p>\n</li>\n<li>\n<p><strong>The contract has been signed by both parties.</strong>\n   → 契約書は双方によって署名されました。\n   （現在完了受動態：完了した動作を強調）</p>\n</li>\n<li>\n<p><strong>The equipment is being repaired now.</strong>\n   → その機器は現在修理されています。\n   （現在進行受動態）</p>\n</li>\n<li>\n<p><strong>All employees should be notified of the policy change.</strong>\n   → すべての従業員にポリシー変更を通知するべきです。\n   （助動詞＋受動態：by句省略）</p>\n</li>\n</ol>\n<hr />\n<h3>TOEICでの狙われ方</h3>\n<p><strong>パターン1：能動 vs. 受動の選択（最頻出）</strong></p>\n<p>空所の直前に目的語がなく、文の主語が「行為を受ける側」であれば受動態を選びます。</p>\n<blockquote>\n<p>The products ______ in South Korea.\n(A) manufactures　(B) manufactured　(C) are manufactured　(D) manufacturing</p>\n</blockquote>\n<p>→ (C) が正解。主語 \"The products\" は製造される側なので受動態。</p>\n<p><strong>パターン2：完了受動態（has/have been + pp）</strong></p>\n<p>「already, recently, just, yet」などの副詞とセットで出ることが多いです。</p>\n<blockquote>\n<p>The system has already been ______ by the IT team.\n→ updated（pp）</p>\n</blockquote>\n<p><strong>パターン3：進行受動態（is/are being + pp）</strong></p>\n<p>「currently, now, at the moment」などとセットで出ます。</p>\n<hr />\n<h3>間違えやすい点</h3>\n<p><strong>1. 能動と受動の混同</strong></p>\n<p>主語が「する側」か「される側」かを最初に確認します。目的語が残っているかどうかが判断の鍵です。</p>\n<ul>\n<li>× The meeting was held by us all employees were informed.</li>\n<li>○ The meeting was held, and all employees were informed.</li>\n</ul>\n<p><strong>2. 過去分詞と過去形の混同</strong></p>\n<p>受動態には必ず be動詞が必要です。be動詞なしで過去分詞だけでは受動態になりません。</p>\n<ul>\n<li>× The letter sent yesterday. （×：be動詞がない）</li>\n<li>○ The letter was sent yesterday.</li>\n</ul>\n<p><strong>3. 完了受動態の語順</strong></p>\n<p>has/have been + pp の順番を崩さないことが重要です。</p>\n<ul>\n<li>× The report has been already updated.</li>\n<li>○ The report has already been updated.（alreadyはhas beenの間に入る）</li>\n</ul>\n<p><strong>4. by以外の前置詞を使う受動態</strong></p>\n<p>行為者以外の情報を表す前置詞は by ではありません。</p>\n<ul>\n<li>be interested <strong>in</strong> ～（～に興味がある）</li>\n<li>be known <strong>for</strong> ～（～で知られている）</li>\n<li>be satisfied <strong>with</strong> ～（～に満足している）</li>\n<li>be composed <strong>of</strong> ～（～で構成されている）</li>\n<li>be concerned <strong>about</strong> ～（～を心配している）</li>\n</ul>\n<p>これらはTOEICでそのまま出題されます。byではなく特定の前置詞とセットで覚えます。</p>\n<hr />", "items": [{"stem": "The annual report ______ to all shareholders by the end of this week.", "note": "", "options": {"A": "will distribute", "B": "will be distributed", "C": "has distributed", "D": "distributes"}, "answer": "B", "explanation": "正解：(B) will be distributed\n\n和訳：年次報告書は今週末までにすべての株主に配布される予定です。\n\n解説：\n- 主語 \"The annual report\" は配布される側なので受動態が必要。\n- \"by the end of this week\" は未来を示すので will be + pp が正解。\n- (A) will distribute は能動態で目的語が必要。(C) has distributed は現在完了能動態。(D) distributes は能動態現在形。", "review": false}, {"stem": "The new office building was ______ by a renowned architect from Milan.", "note": "", "options": {"A": "design", "B": "designed", "C": "designing", "D": "designs"}, "answer": "B", "explanation": "正解：(B) designed\n\n和訳：その新しいオフィスビルはミラノの著名な建築家によって設計されました。\n\n解説：\n- was + ______ の形で、受動態の過去分詞が入ります。\n- (A) design は原形、(C) designing は現在分詞、(D) designs は三人称単数現在形で不適切。", "review": false}, {"stem": "Employees are strongly ______ to register for the training session before Friday.", "note": "", "options": {"A": "encourage", "B": "encouraging", "C": "encouraged", "D": "encouragement"}, "answer": "C", "explanation": "正解：(C) encouraged\n\n和訳：従業員は金曜日までに研修セッションに登録するよう強く奨励されています。\n\n解説：\n- are ______ の形なので、受動態には過去分詞が続きます。\n- \"encourage 人 to do\" の受動態 \"be encouraged to do\" は頻出表現。\n- (A) 原形、(B) 現在分詞、(D) 名詞なので不適切。", "review": false}, {"stem": "The construction of the new highway ______ for three years by the time it is completed.", "note": "", "options": {"A": "will have been ongoing", "B": "has been ongoing", "C": "is ongoing", "D": "was ongoing"}, "answer": "A", "explanation": "正解：(A) will have been ongoing\n\n和訳：その新しい高速道路の建設は、完成する頃には3年間続いていることになります。\n\n解説：\n- \"by the time it is completed\"（完成する頃には）という表現があるので、未来のある時点までの継続を表す未来完了が必要。\n- will have been + 現在分詞（未来完了進行）が最も自然。\n- (B) has been ongoing は現在完了進行で、未来の時点を表せない。\n- (C)(D) は単純な現在・過去で文意に合わない。", "review": false}, {"stem": "The budget proposal is ______ of three sections: revenue, expenditure, and projections.", "note": "", "options": {"A": "consisted", "B": "composing", "C": "comprised", "D": "composed"}, "answer": "D", "explanation": "正解：(D) composed\n\n和訳：予算案は収益、支出、予測の3つのセクションで構成されています。\n\n解説：\n- \"be composed of ～\"（～で構成されている）は固定表現。受動態 is + composed が正解。\n- (A) \"consist\" は自動詞なので受動態にできない（consist of が正しい能動態形）。\n- (B) composing は能動態進行形。\n- (C) \"comprise\" は \"The proposal comprises three sections.\" のように能動態で使うのが正式。\"be comprised of\" は口語的で避けるべき。", "review": false}, {"stem": "By the time the director arrived, the team ______ the presentation.", "note": "復習問1", "options": {"A": "already finished", "B": "had already finished", "C": "has already finished", "D": "already finishes"}, "answer": "B", "explanation": "正解：(B) had already finished\n\n和訳：ディレクターが到着した時には、チームはすでにプレゼンを終えていました。\n\n解説：過去のある時点（arrived）より前に完了した動作は過去完了（had + pp）で表します。(C) has finished は現在完了で、過去の基準点と合わない。", "review": true}, {"stem": "The company ______ its sales target three months ahead of schedule.", "note": "復習問2", "options": {"A": "already has exceeded", "B": "has already exceeded", "C": "had already exceeded", "D": "exceeds already"}, "answer": "B", "explanation": "正解：(B) has already exceeded\n\n和訳：その会社は予定より3か月早く販売目標をすでに超えました。\n\n解説：現在完了では \"already\" は has/have と過去分詞の間に置くのが標準です。(A) already has exceeded は語順が誤り。(C) 過去完了は文脈に合わない。(D) 語順が誤り。", "review": true}, {"stem": "The number of complaints received this quarter ______ significantly higher than last year.", "note": "復習問3", "options": {"A": "are", "B": "is", "C": "were", "D": "have been"}, "answer": "B", "explanation": "正解：(B) is\n\n和訳：今四半期に受け取ったクレームの数は昨年より大幅に多いです。\n\n解説：\"the number of + 複数名詞\" は「数」そのものが主語なので単数扱い（is）。\"a number of + 複数名詞\"（多数の～）と区別することが重要です。\"a number of\" は複数扱い（are）。", "review": true}, {"stem": "Neither the CEO nor the board members ______ aware of the issue until last week.", "note": "復習問4", "options": {"A": "was", "B": "were", "C": "is", "D": "has been"}, "answer": "B", "explanation": "正解：(B) were\n\n和訳：CEOも取締役会メンバーも先週まで問題を認識していませんでした。\n\n解説：\"neither A nor B\" の主語では、動詞はBに一致させます。B = \"the board members\"（複数）なので were が正解。これはTOEICで頻繁に問われる「近接の原則」です。", "review": true}, {"stem": "The ______ of the new product was announced at the press conference.", "note": "補足復習問5", "options": {"A": "launch", "B": "launches", "C": "launching", "D": "launched"}, "answer": "A", "explanation": "正解：(A) launch\n\n和訳：新製品の発売がプレスカンファレンスで発表されました。\n\n解説：冠詞 \"The\" の直後には名詞が来ます。\"launch\" は名詞（発売・開始）として使えます。\"launching\" も名詞用法がありますが、\"the launch of ～\" という形が最も自然なビジネス表現です。(B)(D) は名詞として不適切な形。", "review": true}]}, {"file": "TOEIC_2026-07-08.md", "date": "2026-07-08", "title": "TOEIC(L&R) デイリー演習 2026-07-08", "progress": "トピック進捗：全40トピック中 6個目（No.06 / 40）", "topic": "", "explanation_html": "<h2>解説</h2>\n<h3>1. 要点</h3>\n<p>関係代名詞は、先行詞（名詞）を後ろから修飾する節を導きます。TOEICのPart 5・Part 6では「どの関係代名詞を選ぶか」「that vs. which vs. who をどう使い分けるか」が頻繁に問われます。</p>\n<hr />\n<h3>2. 基本の型と使い分け</h3>\n<table>\n<thead>\n<tr>\n<th>関係代名詞</th>\n<th>先行詞</th>\n<th>節内での役割</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>who</td>\n<td>人</td>\n<td>主語・目的語</td>\n</tr>\n<tr>\n<td>whom</td>\n<td>人</td>\n<td>目的語（やや formal）</td>\n</tr>\n<tr>\n<td>which</td>\n<td>物・事</td>\n<td>主語・目的語</td>\n</tr>\n<tr>\n<td>that</td>\n<td>人・物・事</td>\n<td>主語・目的語（制限用法のみ）</td>\n</tr>\n<tr>\n<td>whose</td>\n<td>人・物</td>\n<td>所有格</td>\n</tr>\n<tr>\n<td>what</td>\n<td>先行詞なし</td>\n<td>名詞節全体（「〜すること/もの」）</td>\n</tr>\n</tbody>\n</table>\n<p><strong>制限用法 vs. 非制限用法</strong></p>\n<ul>\n<li>制限用法（コンマなし）：先行詞を限定する。<code>that</code> も使える。</li>\n<li><em>The report </em><em>that</em><em> he submitted was accurate.</em></li>\n<li>非制限用法（コンマあり）：先行詞に補足情報を加える。<code>that</code> は使えない。<code>which</code> / <code>who</code> のみ。</li>\n<li><em>The annual report, </em><em>which</em><em> was submitted last Friday, was accurate.</em></li>\n</ul>\n<hr />\n<h3>3. 例文（英語＋和訳）</h3>\n<p><strong>① who（主格）</strong></p>\n<blockquote>\n<p>The manager <strong>who</strong> approved the budget has 15 years of experience.\n予算を承認したマネージャーは15年の経験を持っています。</p>\n</blockquote>\n<p><strong>② which（非制限用法）</strong></p>\n<blockquote>\n<p>The new product, <strong>which</strong> was launched last quarter, exceeded sales targets.\n先四半期に発売された新製品は、販売目標を超えました。</p>\n</blockquote>\n<p><strong>③ whose（所有格）</strong></p>\n<blockquote>\n<p>The employee <strong>whose</strong> proposal was selected will lead the project.\n提案が採用された社員がそのプロジェクトを率います。</p>\n</blockquote>\n<p><strong>④ whom（目的格、前置詞つき）</strong></p>\n<blockquote>\n<p>The director <strong>with whom</strong> we met yesterday will join our team.\n昨日面会した部長が私たちのチームに加わります。</p>\n</blockquote>\n<p><strong>⑤ what（先行詞なし・名詞節）</strong></p>\n<blockquote>\n<p><strong>What</strong> surprised everyone was the speed of the delivery.\n全員を驚かせたのは配達の速さでした。</p>\n</blockquote>\n<hr />\n<h3>4. TOEICでの狙われ方</h3>\n<ol>\n<li><strong>空所の直前の先行詞が「人」か「物」か</strong>を見て who / which を選ばせる。</li>\n<li><strong>コンマの有無</strong>を手がかりに、that を除外させる（非制限用法では that 不可）。</li>\n<li><strong>前置詞 + 関係代名詞</strong>の形：<em>for which</em>, <em>in which</em>, <em>by whom</em> など。前置詞が先にある場合は <code>that</code> 不可。</li>\n<li><strong>whose</strong> を「所有格の関係代名詞」として選ばせる（<em>a company whose headquarters is in Tokyo</em>）。</li>\n<li><strong>what</strong> vs. <strong>that</strong>：先行詞がある場合は that / which、先行詞がない名詞節には what。</li>\n</ol>\n<hr />\n<h3>5. 間違えやすい点</h3>\n<table>\n<thead>\n<tr>\n<th>よくある誤り</th>\n<th>正しい形</th>\n<th>理由</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>The staff <em>which</em> attended...</td>\n<td>The staff <em>who</em> attended...</td>\n<td>人には who</td>\n</tr>\n<tr>\n<td>The result, <em>that</em> we expected...</td>\n<td>The result, <em>which</em> we expected...</td>\n<td>コンマあり非制限用法に that は不可</td>\n</tr>\n<tr>\n<td><em>What</em> the company <em>that</em> he founded...</td>\n<td>The company <em>that</em> he founded...</td>\n<td>what は先行詞を含む。先行詞があるなら that</td>\n</tr>\n<tr>\n<td>the manager <em>who's</em> department...</td>\n<td>the manager <em>whose</em> department...</td>\n<td>所有格は whose（who's = who is の短縮形）</td>\n</tr>\n<tr>\n<td>the project <em>for that</em> we planned...</td>\n<td>the project <em>for which</em> we planned...</td>\n<td>前置詞の直後に that は置けない</td>\n</tr>\n</tbody>\n</table>\n<hr />", "items": [{"stem": "The consultant ______ we hired last month has extensive experience in logistics.", "note": "", "options": {"A": "who", "B": "whom", "C": "whose", "D": "which"}, "answer": "B", "explanation": "正解：(B) whom\n\n和訳： 先月採用したコンサルタントは物流に豊富な経験を持っています。\n\n解説：\n空所の先行詞は \"The consultant\"（人）。空所後に \"we hired\"（主語＋動詞）が続いており、関係代名詞は \"hired\" の目的語の役割を果たします。目的格かつ人 → whom。\n- (A) who：主格なので、後に続く節の動詞が目的語を欠いてはいません。文法的に使えないことはないですが、後に \"we hired\"（SV）が来る構造では目的格の whom が正確。\n- (C) whose：所有格であり、後に名詞が来るはずですが \"we hired\" が続くので不適。\n- (D) which：先行詞が人なので不適。", "review": false}, {"stem": "Our new headquarters, ______ is located in Osaka, will open next spring.", "note": "", "options": {"A": "that", "B": "what", "C": "which", "D": "where"}, "answer": "C", "explanation": "正解：(C) which\n\n和訳： 大阪に所在する私たちの新本社は来春オープンします。\n\n解説：\nコンマあり（非制限用法）で先行詞は \"Our new headquarters\"（物）。非制限用法には that は使えないため (A) は不可。(B) what は先行詞を含む名詞節を導くので先行詞がある場合は不適。(D) where は場所の関係副詞ですが、後の節が \"is located\" で動詞の主語が欠けているため関係代名詞が必要 → (C) which。", "review": false}, {"stem": "The employee ______ performance exceeded expectations received a bonus.", "note": "", "options": {"A": "who", "B": "whom", "C": "which", "D": "whose"}, "answer": "D", "explanation": "正解：(D) whose\n\n和訳： 業績が期待を超えた社員はボーナスを受け取りました。\n\n解説：\n空所後が \"performance exceeded\"（名詞＋動詞）という構造。先行詞 \"The employee\" の「所有物」である performance が後に続いているため、所有格の関係代名詞 whose が必要です。", "review": false}, {"stem": "______ the finance team proposed at the meeting was approved by the board.", "note": "", "options": {"A": "That", "B": "What", "C": "Which", "D": "Whoever"}, "answer": "B", "explanation": "正解：(B) What\n\n和訳： 財務チームが会議で提案したことは取締役会に承認されました。\n\n解説：\n文頭の空所からコンマなしに \"the finance team proposed\" が続き、それ全体が主語になっています。先行詞がなく「〜すること」という名詞節を作るのは what。(A) that は接続詞として名詞節を作れますが、that節を文頭の主語として使う場合は通常 that節全体を it で受けて後置するため不自然。また \"that the finance team proposed\" では proposed の目的語が欠けており、what の方が正確。", "review": false}, {"stem": "The project ______ the new policy was designed will be reviewed next month.", "note": "", "options": {"A": "for which", "B": "for that", "C": "by whom", "D": "with which"}, "answer": "A", "explanation": "正解：(A) for which\n\n和訳： 新しい方針が策定されたプロジェクトは来月再検討されます。\n\n解説：\n先行詞は \"The project\"（物）。空所後 \"the new policy was designed\" は「〜のために」設計された、という意味になるため前置詞 for が必要。前置詞の直後には that は置けない（B は不可）。先行詞が物なので whom（人用）を含む (C) も不可。\"with which\" は「〜を用いて」という意味になり文意が合わない。→ (A) for which。", "review": false}, {"stem": "The quarterly report ______ by the accounting team before the deadline.", "note": "復習問題 1-1", "options": {"A": "was submitted", "B": "submitted", "C": "has submitted", "D": "submitting"}, "answer": "A", "explanation": "正解：(A) was submitted\n\n和訳： 四半期報告書は締め切り前に経理チームによって提出されました。", "review": true}, {"stem": "All visitors ______ to sign in at the reception desk upon arrival.", "note": "復習問題 1-2", "options": {"A": "required", "B": "are required", "C": "have required", "D": "require"}, "answer": "B", "explanation": "解説： \"The quarterly report\" は「提出する」主体ではなく「提出される」側です。受動態 `was submitted`（過去形 be + 過去分詞）が正解。by the accounting team で動作主が示されています。(B) submitted は能動態の過去形なので主語が提出する側になってしまいます。", "review": true}, {"stem": "The company ______ its new office in Singapore next year.", "note": "復習問題 3-1", "options": {"A": "opened", "B": "has opened", "C": "will open", "D": "opens"}, "answer": "B", "explanation": "正解：(B) are required\n\n和訳： すべての来訪者は到着時に受付でサインインするよう求められます。\n\n解説： \"All visitors\" は「求める」主体ではなく「求められる」対象です。現在の規則・方針を述べる受動態 `are required`（現在形 be + 過去分詞）が正解。`be required to do` で「〜するよう求められる」という定型表現でもあります。", "review": true}, {"stem": "She ______ for the company since she graduated from university ten years ago.", "note": "復習問題 3-2", "options": {"A": "worked", "B": "works", "C": "has worked", "D": "will work"}, "answer": "C", "explanation": "正解：(C) will open\n\n和訳： その会社は来年シンガポールに新オフィスをオープンします。", "review": true}, {"stem": "The ______ of the merger will be announced at next week's press conference.", "note": "", "options": {"A": "complete", "B": "completely", "C": "completion", "D": "completed"}, "answer": "A", "explanation": "解説： \"next year\" という未来を示す副詞句があるため、未来形 `will open` が正解。(A) 過去形、(B) 現在完了形はどちらも過去〜現在の出来事を示し、未来の文脈に合いません。(D) 現在形は確定的なスケジュール（時刻表など）を示すのに使えますが、next year 単独では will を使うのが自然です。", "review": true}]}, {"file": "TOEIC_2026-07-10.md", "date": "2026-07-10", "title": "TOEIC(L&R) デイリー演習 - 2026-07-10", "progress": "トピック進捗：全40トピック中 7個目（No.07 / 40）", "topic": "分野：文法 / トピック：関係副詞・複合関係詞", "explanation_html": "<h2>詳しい解説</h2>\n<h3>要点</h3>\n<p>関係副詞(where, when, why, how)は、場所・時・理由・方法を表す先行詞を受けて、後ろに要素の欠けていない完全な文を続けます。関係代名詞(which, who, that)との最大の違いは、後ろに続く文が完全か不完全かという点です。関係代名詞の後ろは主語や目的語が1つ欠けた不完全な文になり、関係副詞の後ろは文法要素がすべて揃った完全な文になります。</p>\n<p>複合関係詞(whoever, whatever, whichever, whenever, wherever, however)は先行詞を含む関係詞で、それ自体が「~する人/もの/時/場所は何でも・誰でも」という意味を持ち、名詞節または副詞節を作ります。</p>\n<h3>ルールや型</h3>\n<p>場所を表す関係副詞は、the office, the city, the placeのような場所を表す先行詞を受け、whereの後ろに完全文を続けます。時を表す関係副詞は、the time, the day, the yearのような時を表す先行詞を受け、whenの後ろに完全文を続けます。理由を表す関係副詞は、the reasonという先行詞を受け、whyの後ろに完全文を続けます。この場合、the reasonとwhyのどちらか一方を省略することも可能です。方法を表す関係副詞は、the wayという先行詞を受け、howの後ろに完全文を続けますが、the wayとhowを同時に使うことはできません。the way、the way that、the way in which、howのいずれか一つを選びます。</p>\n<p>関係副詞は「前置詞+関係代名詞」に書き換えられる関係にあります。the office in which she worksは、the office where she worksと同じ意味になります。</p>\n<p>複合関係詞については、whoeverは「~する人は誰でも」という意味で、後ろに主語が欠けた節が続く場合は主格として働き、文全体の主語や動詞の目的語になる名詞節を作ります。whatever、whicheverは「何でも」「どちらでも」という意味で、名詞節を作る場合と、whatever/whichever+名詞の形で形容詞的に使われる場合があります。whenever、whereverは「いつでも」「どこでも」という意味の副詞節を作ります。howeverは「どんなに~でも」という意味で、however+形容詞/副詞+主語+動詞という語順を取ります。</p>\n<h3>例文(英語+和訳)</h3>\n<p>This is the hotel where we stayed during our trip to Kyoto.\n(これは私たちが京都旅行中に滞在したホテルです。)</p>\n<p>I remember the day when we first met.\n(私たちが初めて会った日を覚えています。)</p>\n<p>The reason why the meeting was postponed has not been announced.\n(会議が延期された理由はまだ発表されていません。)</p>\n<p>Whoever completes the survey first will receive a small gift.\n(アンケートを最初に完了した人は誰でも、ちょっとした贈り物を受け取ります。)</p>\n<p>You may choose whichever plan suits your budget.\n(予算に合う方のプランをどちらでも選んで構いません。)</p>\n<p>However busy she is, she always replies to emails within a day.\n(彼女はどんなに忙しくても、1日以内にメールに返信します。)</p>\n<h3>TOEICでの狙われ方</h3>\n<p>Part5では、空所の後ろに続く文が完全文か不完全文かを見分けさせ、関係代名詞(which, that)と関係副詞(where, when)のどちらを選ぶかを問う問題が頻出します。先行詞がofficeやplaceのような場所を表す語であっても、後ろの文に目的語が欠けていればwhichを選ぶ必要があり、先行詞の意味だけで機械的にwhereを選ぶと誤答になります。複合関係詞では、whoeverが文の主語として機能しているか、動詞の目的語として機能しているかを問う問題や、however+形容詞/副詞の語順を問う問題が出題されます。</p>\n<h3>間違えやすい点</h3>\n<p>the reason whyとthe way howは、それぞれwhyとhowを同時に先行詞と一緒に使ってしまう誤りが起きやすい箇所です。the wayを使う場合はhowを省略し、howを使う場合はthe wayを省略します。また、先行詞が場所や時を表す語であっても、後ろの文の要素が欠けていれば関係副詞ではなく関係代名詞を使う点にも注意が必要です。whoeverとwhomeverは、名詞節内での格(主語か目的語か)によって使い分けますが、TOEICでは主格のwhoeverが出題の中心です。howeverの語順も、however it is difficultのように形容詞を後ろに置く誤りが起きやすいため、however difficult it isという語順を正確に押さえておく必要があります。</p>", "items": [{"stem": "This is the hotel ________ we stayed during our trip to Kyoto.", "note": "", "options": {"A": "which", "B": "where", "C": "who", "D": "what"}, "answer": "B", "explanation": "正解：(B) where\n和訳：これは私たちが京都旅行中に滞在したホテルです。", "review": false}, {"stem": "Please let me know ________ time is convenient for you to meet.", "note": "", "options": {"A": "whichever", "B": "wherever", "C": "whoever", "D": "however"}, "answer": "A", "explanation": "解説：weが主語、stayedが動詞の完全文が続いているため関係副詞whereが正解です。(A) whichは後ろに不完全文が必要なため不可。(C) whoは人を先行詞にする関係代名詞のため不可。(D) whatは先行詞を取らない関係代名詞のため不可。", "review": false}, {"stem": "________ finishes the project first will receive a bonus.", "note": "", "options": {"A": "Whoever", "B": "Whomever", "C": "Whatever", "D": "Wherever"}, "answer": "A", "explanation": "正解：(A) whichever\n和訳：あなたにとって都合の良い時間をどちらでも教えてください。\n解説：whichever timeで「どの時間でも」という意味の名詞句を作ります。(B) whereverは場所を表す副詞節を作るため文脈に合いません。(C) whoeverは人を表すため名詞timeを修飾できません。(D) howeverは形容詞/副詞を伴う譲歩表現のためここでは不可。", "review": false}, {"stem": "The reason ________ the shipment was delayed remains unclear.", "note": "", "options": {"A": "which", "B": "why", "C": "what", "D": "who"}, "answer": "A", "explanation": "正解：(A) Whoever\n和訳：プロジェクトを最初に終わらせた人は誰でもボーナスを受け取ります。", "review": false}, {"stem": "You can call me ________ you need assistance.", "note": "", "options": {"A": "whatever", "B": "whoever", "C": "whenever", "D": "wherever"}, "answer": "B", "explanation": "解説：finishesの主語となる名詞節が必要なため、主格のwhoeverが正解です。(B) Whomeverは目的格のため動詞の主語にはなれません。(C) Whateverは人ではなく物事を指すため文脈に合いません。(D) Whereverは場所を表す副詞節のため主語になれません。", "review": false}, {"stem": "This is the article ________ I mentioned earlier in the meeting.", "note": "", "options": {"A": "which", "B": "where", "C": "who", "D": "whom"}, "answer": "B", "explanation": "正解：(B) why\n和訳：出荷が遅れた理由は依然として不明です。", "review": true}, {"stem": "The report ________ by the manager before it is submitted.", "note": "", "options": {"A": "reviews", "B": "is reviewed", "C": "reviewing", "D": "review"}, "answer": "A", "explanation": "解説：先行詞the reasonを受け、後ろにthe shipment was delayedという完全文が続くため関係副詞whyが正解です。(A) whichは後ろに不完全文が必要なため不可。(C) whatは先行詞を取れないため不可。(D) whoは人を先行詞にするため不可。", "review": true}, {"stem": "The new policy ________ next month.", "note": "", "options": {"A": "will implement", "B": "will be implemented", "C": "implementing", "D": "implements"}, "answer": "C", "explanation": "正解：(C) whenever\n和訳：助けが必要な時はいつでも私に電話してください。", "review": true}, {"stem": "The company announced a ________ increase in sales.", "note": "", "options": {"A": "significant", "B": "significantly", "C": "significance", "D": "signify"}, "answer": "A", "explanation": "解説：「必要な時はいつでも」という時を表す副詞節が文脈に合うためwheneverが正解です。(A) whateverは物事、(B) whoeverは人、(D) whereverは場所を表すため、いずれも文脈に合いません。", "review": true}, {"stem": "She completed the task ________.", "note": "", "options": {"A": "efficient", "B": "efficiency", "C": "efficiently", "D": "efficiencies"}, "answer": "A", "explanation": "正解：(A) which\n和訳：これが私が会議の前半で言及した記事です。", "review": true}]}, {"file": "TOEIC_2026-07-13.md", "date": "2026-07-13", "title": "TOEIC デイリー演習 2026-07-13", "progress": "トピック進捗：全40トピック中 8個目（No.08 / 40）", "topic": "### 要点 / Part 5 で最頻出の出題型のひとつです。空所の後ろの形を見て、「接続詞（後ろに S+V の節が来る）」か「前置詞（後ろに名詞・動名詞が来る）」かを判断します。意味が同じでも品詞が違うペアが狙われます。判断手順は次の2段階です。 / 1. 空所の直後を見る。`S + V`（主語と動詞のそろった節）なら接続詞、名詞・名詞句・動名詞なら前置詞。 / 2. 形の候補が複数残ったら、意味（時・理由・譲歩・条件）で絞る。 / ### ルールと型（意味別の対照表） / | 意味 | 接続詞（+ S V） | 前置詞（+ 名詞） | / |---|---|---| / | 〜の間 | while | during | / | 〜までに | by the time | by | / | 〜まで（継続） | until | until（両方可） | / | 〜なので | because, since, as | because of, due to, owing to | / | 〜にもかかわらず | although, though, even though | despite, in spite of | / | 〜の場合 | if, in case | in case of, in the event of | / | 〜がなければ | unless | without, barring | / 特に注意が必要な点を挙げます。 / - during は接続詞として使えません。 × During I was there → ○ While I was there / ○ During my stay / - despite / in spite of の後ろに節は置けません。 × Despite it rained → ○ Despite the rain / ○ Although it rained。なお despite of は誤りです（in spite of と混同した形）。 / - because of の後ろに節は置けません。 逆に because の後ろに単独の名詞句は置けません。 / - until は接続詞・前置詞の両方で使えます（until 5 p.m. / until the meeting ends）。while も「一方で」の意味で対比を表す用法があります。 / - 分詞・省略形にも注意します。While attending the conference のように、接続詞の後ろで「S + be」が省略されて分詞が続く形は正しい英語です（主節と主語が一致する場合）。 / ### 例文（英語＋和訳） / 1. Despite the heavy rain, the outdoor event proceeded as scheduled. / （激しい雨にもかかわらず、屋外イベントは予定どおり実施されました。）→ 後ろが名詞句 the heavy rain なので前置詞 despite。 / 2. Although the budget was limited, the marketing team achieved excellent results. / （予算が限られていたにもかかわらず、マーケティングチームは優れた成果を上げました。）→ 後ろが節 the budget was limited なので接続詞 although。 / 3. Please silence your mobile phones during the performance. / （公演中は携帯電話をマナーモードにしてください。）→ 後ろが名詞 the performance なので during。 / 4. The shipment was delayed because of a customs inspection. / （通関検査のため、出荷が遅れました。）→ 後ろが名詞句なので because of。 / 5. While the new software is more expensive, it offers significantly better security. / （新しいソフトウェアはより高価ですが、セキュリティは大幅に優れています。）→ 対比の while。後ろは節。 / ### TOEICでの狙われ方 / - 選択肢に (A) despite (B) although (C) because of (D) while のように接続詞と前置詞を混ぜて並べ、空所直後の形だけで即答できる問題が定番です。20秒以内で処理したい問題型です。 / - Part 6 では前後の文との論理関係（逆接か因果か）まで見て選ばせる形で出ます。 / - due to と because of の言い換え、in the event of（= if）などのやや硬い表現も頻出です。 / ### 間違えやすい点 / - 意味だけで選んでしまい、後ろの形を確認しない（despite と although の混同が典型です）。 / - during を「〜する間」と訳して節の前に置いてしまう。 / - because of / due to の後ろに節を続けてしまう。 / - while + 分詞（While reviewing the report, ...）を「節がないから接続詞は不可」と誤って除外してしまう。省略構文として正しい形です。", "explanation_html": "", "items": [{"stem": "------- the negotiations lasted longer than expected, both parties reached an agreement by Friday.", "note": "", "options": {"A": "Despite", "B": "Although", "C": "Because of", "D": "During"}, "answer": "B", "explanation": "正解：(B)\n和訳：交渉は予想より長引いたものの、両者は金曜日までに合意に達しました。\n解説：空所の後ろは the negotiations lasted という S+V の節なので接続詞が必要です。(A) despite、(C) because of、(D) during はすべて前置詞なので節を導けません。意味の上でも逆接が合うため although が正解です。", "review": false}, {"stem": "All visitors must wear identification badges ------- their stay at the facility.", "note": "", "options": {"A": "while", "B": "when", "C": "during", "D": "since"}, "answer": "C", "explanation": "正解：(C)\n和訳：来訪者は全員、施設に滞在している間は身分証バッジを着用しなければなりません。\n解説：空所の後ろは their stay という名詞句なので前置詞が必要です。(A) while と (B) when は接続詞で後ろに節が必要です。(D) since は前置詞の用法もありますが「〜以来」の意味になり文意に合いません。", "review": false}, {"stem": "The product launch was postponed ------- unexpected supply chain disruptions.", "note": "", "options": {"A": "because", "B": "owing to", "C": "even though", "D": "so that"}, "answer": "B", "explanation": "正解：(B)\n和訳：予期しないサプライチェーンの混乱のため、製品の発売は延期されました。", "review": false}, {"stem": "------- of a fire alarm, please proceed calmly to the nearest exit.", "note": "", "options": {"A": "In case", "B": "In the event", "C": "Because", "D": "Unless"}, "answer": "A", "explanation": "解説：後ろが unexpected supply chain disruptions という名詞句なので前置詞句 owing to（= because of）が正解です。(A) because、(C) even though、(D) so that はいずれも接続詞で、後ろに節が必要です。", "review": false}, {"stem": "------- reviewing the quarterly figures, the accountant noticed a discrepancy in the travel expenses.", "note": "", "options": {"A": "During", "B": "Despite", "C": "While", "D": "Because"}, "answer": "B", "explanation": "正解：(B)\n和訳：火災報知器が作動した場合は、最寄りの出口へ落ち着いて進んでください。\n解説：空所直後に of があるため、in the event of（〜の場合には）という定型句を完成させる (B) が正解です。(A) は in case of なら可ですが、in case + of の形では in case は接続詞用法（in case S V）と衝突します。設問の形では In the event of が自然な定型です。(C)(D) は of と結びつく用法がありません。", "review": false}, {"stem": "The conference room must ------- at least two days in advance.", "note": "", "options": {"A": "reserve", "B": "be reserved", "C": "have reserved", "D": "reserving"}, "answer": "C", "explanation": "正解：(C)\n和訳：四半期の数字を確認している間に、その会計士は出張費に不一致があることに気づきました。\n解説：While (she was) reviewing ... の「S + be」省略構文です。接続詞 while は主節と主語が同じとき分詞を直接続けられます。(A) during は前置詞なので動名詞句を続けられるように見えますが、during + doing の形は不可です（during は動作名詞を取ります）。(B) despite は意味が合わず、(D) because は節が必要です。", "review": true}, {"stem": "The hotel ------- the annual banquet will be held is conveniently located near the airport.", "note": "", "options": {"A": "which", "B": "where", "C": "what", "D": "whose"}, "answer": "B", "explanation": "正解：(B)\n和訳：会議室は少なくとも2日前までに予約されなければなりません。\n解説:主語 The conference room は「予約される」側なので受動態 be reserved が必要です。(A)(C) は能動態で目的語が必要になり、(D) は must の後ろに置けません。", "review": true}, {"stem": "------- submits the best proposal will be awarded the contract.", "note": "", "options": {"A": "Whoever", "B": "Whomever", "C": "Whichever", "D": "However"}, "answer": "B", "explanation": "正解：(B)\n和訳：年次晩餐会が開催されるホテルは、空港の近くという便利な場所にあります。", "review": true}, {"stem": "By the time the auditors arrived, the finance team ------- all the necessary documents.", "note": "", "options": {"A": "prepares", "B": "has prepared", "C": "had prepared", "D": "will prepare"}, "answer": "A", "explanation": "解説：空所の後ろ the annual banquet will be held は完全な文（受動態で目的語不要）なので、関係副詞 where が正解です。(A) which は後ろに不完全な文が必要です。(C) what は先行詞を取れません。(D) whose は直後に無冠詞の名詞が続き所有関係を表しますが、ここでは文意が成り立ちません。", "review": true}, {"stem": "Ms. Tanaka ------- for the company for fifteen years before she was promoted to regional director.", "note": "", "options": {"A": "has worked", "B": "had worked", "C": "works", "D": "is working"}, "answer": "A", "explanation": "正解：(A)\n和訳：最も優れた提案を提出した者が誰であれ、契約を獲得します。", "review": true}]}, {"file": "TOEIC_2026-07-15.md", "date": "2026-07-15", "title": "TOEIC(L&R) デイリー演習 — 2026-07-15", "progress": "トピック進捗：全40トピック中 9個目（No.09 / 40）", "topic": "分野：文法 / No.09 | 接続副詞（however, therefore など）", "explanation_html": "<h2>詳しい解説</h2>\n<h3>要点</h3>\n<p>接続副詞（conjunctive adverb）は、however, therefore, moreover, nevertheless などのように、<strong>文と文の論理関係（逆接・因果・追加・対比など）を示す副詞</strong>です。名前に「接続」と付きますが、品詞はあくまで <strong>副詞</strong> であり、接続詞ではありません。ここがTOEICで最も狙われる点です。</p>\n<h3>ルール・型</h3>\n<p>接続副詞は副詞なので、<strong>2つの独立した文（節）を文法的に接続する力はありません</strong>。したがって、2文をつなぐときは以下のどちらかの形を取ります。</p>\n<p>型1：ピリオドで文を切り、次の文頭に置く\n<code>Sales dropped last quarter. However, the outlook remains positive.</code></p>\n<p>型2：セミコロン（;）でつなぎ、接続副詞＋カンマを続ける\n<code>Sales dropped last quarter; however, the outlook remains positive.</code></p>\n<p><strong>やってはいけない形（誤り）</strong>：カンマ1つで2文をつなぐ\n<code>Sales dropped last quarter, however, the outlook remains positive.</code> ← これは comma splice（カンマだけで独立節を接続）で誤りです。</p>\n<p>位置は柔軟で、文頭・文中（主語の後、be動詞の後など）・文末に置けます。文中・文末ではカンマで区切ります。\n<code>The outlook, however, remains positive.</code>\n<code>The outlook remains positive, however.</code></p>\n<h3>意味グループ（TOEIC頻出）</h3>\n<ul>\n<li>逆接・対比：however（しかし）, nevertheless / nonetheless（それにもかかわらず）, on the other hand（一方で）, in contrast（対照的に）, instead（代わりに）, otherwise（さもなければ）</li>\n<li>因果・結果：therefore / thus / hence（したがって）, as a result（その結果）, consequently（結果として）, accordingly（それに応じて）</li>\n<li>追加：moreover / furthermore / in addition / additionally / besides（さらに）</li>\n<li>例示・言い換え：for example / for instance（例えば）, in other words（言い換えると）</li>\n<li>時間・順序：then（それから）, meanwhile（その間に）, afterward（その後）, finally（最後に）</li>\n</ul>\n<h3>例文（英語＋和訳）</h3>\n<ol>\n<li><code>The shipment was delayed; therefore, we offered the client a discount.</code>\n   出荷が遅れました。したがって、私たちは顧客に割引を提示しました。</li>\n<li><code>The proposal is expensive. Nevertheless, the board approved it.</code>\n   その提案は高額です。それにもかかわらず、取締役会はそれを承認しました。</li>\n<li><code>Ms. Tanaka manages the Tokyo office. In addition, she oversees regional sales.</code>\n   タナカさんは東京オフィスを統括しています。加えて、地域販売も監督しています。</li>\n<li><code>Submit the form by Friday; otherwise, your application will not be processed.</code>\n   金曜日までにフォームを提出してください。さもないと、あなたの申請は処理されません。</li>\n</ol>\n<h3>TOEICでの狙われ方</h3>\n<p>Part 5・6 の空所補充で、<strong>接続副詞 vs 接続詞 vs 前置詞</strong> を見分けさせる問題が定番です。判断の手順は次の通りです。</p>\n<ol>\n<li>空所が <strong>2つの完全な文（S+V）をつないでいる位置</strong> で、その直前がピリオドまたはセミコロンなら → 接続副詞（however など）が正解。</li>\n<li>空所の後ろが <strong>S+V の節</strong> で、1つの文の中で従属節を作っているなら → 接続詞（although, because, while など）が正解。</li>\n<li>空所の後ろが <strong>名詞（句）だけ</strong> なら → 前置詞（despite, because of など）が正解。</li>\n</ol>\n<p>Part 6 では、前後の文の論理関係（逆接か因果か追加か）を読み取って、意味の合う接続副詞を選ばせます。文法的にはどれも入るため、<strong>文脈判断</strong>が鍵になります。</p>\n<h3>間違えやすい点</h3>\n<ul>\n<li><strong>however と but / although の混同</strong>：however は副詞なので <code>, however,</code> で2文をカンマ接続してはいけません。but（等位接続詞）や although（従属接続詞）は節をつなげます。</li>\n<li>誤：<code>It rained, however we went out.</code></li>\n<li>正：<code>It rained; however, we went out.</code> / <code>It rained, but we went out.</code> / <code>Although it rained, we went out.</code></li>\n<li><strong>therefore と so の違い</strong>：therefore は接続副詞（<code>;</code>または<code>.</code>が必要）、so は等位接続詞（カンマでつなげる）です。</li>\n<li><strong>despite / in spite of は前置詞句</strong>：後ろに名詞が来ます。節（S+V）は取れません。節を取るのは although です。</li>\n<li>意味の取り違え：nevertheless（逆接）を「さらに（追加）」の意味で選んでしまうミスに注意します。</li>\n</ul>\n<hr />", "items": [{"stem": "The new software improved efficiency; ______, several employees found it difficult to use at first.", "note": "", "options": {"A": "therefore", "B": "however", "C": "moreover", "D": "because"}, "answer": "B", "explanation": "正解：(B) however\n和訳：新しいソフトは効率を改善しました。しかし、数人の従業員は最初それを使いにくいと感じました。\n解説：前半（効率が上がった＝プラス）と後半（使いにくい＝マイナス）が逆接の関係。セミコロンの後なので接続副詞が入る位置です。(A) therefore・(C) moreover は逆接ではないため意味が合いません。(D) because は接続詞で、セミコロンの後・独立節をつなぐ用法として不適切です。", "review": false}, {"stem": "Mr. Lee was unable to attend the meeting. ______, he sent a detailed report in advance.", "note": "", "options": {"A": "In addition", "B": "For example", "C": "Instead", "D": "Otherwise"}, "answer": "C", "explanation": "正解：(C) Instead\n和訳：リーさんは会議に出席できませんでした。代わりに、彼は事前に詳細な報告書を送りました。\n解説：「出席できない → 代わりに報告書」という置き換えの関係。(A) In addition（追加）・(B) For example（例示）・(D) Otherwise（さもなければ）は文脈に合いません。", "review": false}, {"stem": "The factory met all safety standards; ______, it passed the inspection without any issues.", "note": "", "options": {"A": "nevertheless", "B": "in contrast", "C": "as a result", "D": "on the other hand"}, "answer": "C", "explanation": "正解：(C) as a result\n和訳：工場はすべての安全基準を満たしました。その結果、問題なく検査に合格しました。\n解説：基準を満たした（原因）→ 合格した（結果）の因果関係。(A)(B)(D) はいずれも逆接・対比を示すため、この因果の流れに合いません。", "review": false}, {"stem": "______ the high cost, the company decided to upgrade its equipment.", "note": "", "options": {"A": "However", "B": "Despite", "C": "Therefore", "D": "Nevertheless"}, "answer": "B", "explanation": "正解：(B) Despite\n和訳：高いコストにもかかわらず、その会社は設備を更新することにしました。\n解説：空所の後ろは `the high cost`（名詞句）だけで、節ではありません。名詞句を取れるのは前置詞の (B) Despite。(A) However・(C) Therefore・(D) Nevertheless は接続副詞で、後ろに名詞句だけを直接取れません。品詞の識別が鍵です。", "review": false}, {"stem": "Our supplier raised its prices last month; ______, we are now looking for alternative vendors.", "note": "", "options": {"A": "for instance", "B": "consequently", "C": "in other words", "D": "meanwhile"}, "answer": "B", "explanation": "正解：(B) consequently\n和訳：私たちの仕入先は先月価格を引き上げました。その結果、私たちは今、代替の業者を探しています。\n解説：値上げ（原因）→ 別業者を探す（結果）の因果。(A) for instance（例示）・(C) in other words（言い換え）・(D) meanwhile（その間）は因果を示しません。", "review": false}, {"stem": "The annual report ______ by the finance team before the deadline.", "note": "（補充：受動態 / 2026-07-07 より）", "options": {"A": "completed", "B": "was completed", "C": "has completing", "D": "completing"}, "answer": "B", "explanation": "正解：(B) was completed\n和訳：年次報告書は締め切り前に財務チームによって完成されました。\n解説：`by the finance team`（動作主）があり、主語 report は「完成される」側なので受動態。(A) は能動、(C)(D) は形が不正です。", "review": true}, {"stem": "The conference room ______ the workshop will be held has been reserved.", "note": "（補充：関係副詞・複合関係詞 / 2026-07-10 より）", "options": {"A": "which", "B": "where", "C": "what", "D": "who"}, "answer": "B", "explanation": "正解：(B) where\n和訳：ワークショップが開催される会議室は予約されています。\n解説：先行詞が場所（room）で、後ろが完全な文（the workshop will be held）なので関係副詞 where。(A) which は後ろに不完全な文が必要、(C) what は先行詞を取れない、(D) who は人が先行詞のときに使います。", "review": true}, {"stem": "The client ______ we met yesterday requested a revised quotation.", "note": "", "options": {"A": "whom", "B": "which", "C": "whose", "D": "what"}, "answer": "A", "explanation": "正解：(A) whom\n和訳：私たちが昨日会った顧客は、修正見積もりを要求しました。\n解説：先行詞が人（client）で、関係詞節の中では met の目的語（目的格）。よって whom。(B) which は物、(C) whose は所有格、(D) what は先行詞を取りません。", "review": true}, {"stem": "We hired a consultant ______ specializes in digital marketing.", "note": "", "options": {"A": "who", "B": "whom", "C": "which", "D": "whose"}, "answer": "A", "explanation": "正解：(A) who\n和訳：私たちはデジタルマーケティングを専門とするコンサルタントを雇いました。\n解説：先行詞が人（consultant）で、関係詞節の中では specializes の主語（主格）。よって who。(B) whom は目的格、(C) which は物、(D) whose は所有格です。", "review": true}]}];
const LT = ["A","B","C","D"];
let current = 0;
let scores = {};

function markBlank(s){
  return s.replace(/[_＿]{2,}|…{2,}/g, '<span class="blank">____</span>');
}
function escapeHtml(s){
  return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML='';
  DATA.forEach((d,i)=>{
    const b = document.createElement('button');
    b.textContent = d.date || d.file;
    b.onclick = ()=>showDay(i);
    nav.appendChild(b);
  });
}
function buildContent(){
  const c = document.getElementById('content');
  c.innerHTML='';
  DATA.forEach((d,di)=>{
    scores[di] = {done:new Set(), ok:new Set()};
    const day = document.createElement('div');
    day.className='day'; day.id='day'+di;
    const head = document.createElement('div'); head.className='dayhead';
    head.innerHTML = `<div class="badge">${escapeHtml(d.progress||'')}</div>
      <h2>${escapeHtml(d.title)}</h2>
      <div class="topic">${escapeHtml(d.topic)}</div>`;
    day.appendChild(head);
    if(d.explanation_html){
      const det = document.createElement('details'); det.className='toggle-expl';
      det.innerHTML = `<summary>詳しい解説を読む</summary><div class="expl-body">${d.explanation_html}</div>`;
      day.appendChild(det);
    }
    let lastReview = null;
    d.items.forEach((it, qi)=>{
      if(it.review !== lastReview){
        const lab = document.createElement('div'); lab.className='sec-label';
        lab.textContent = it.review ? '復習問題' : '今日の例題';
        day.appendChild(lab);
        lastReview = it.review;
      }
      day.appendChild(buildQ(di, qi, it));
    });
    c.appendChild(day);
  });
}
function buildQ(di, qi, it){
  const wrap = document.createElement('div'); wrap.className='q';
  const qid = di+'_'+qi;
  const num = document.createElement('div'); num.className='qnum';
  num.textContent = (it.review?'復習 ':'Q') + (qi+1);
  wrap.appendChild(num);
  if(it.note){ const nt=document.createElement('div'); nt.className='qnote'; nt.textContent=it.note; wrap.appendChild(nt);}
  const stem = document.createElement('div'); stem.className='stem';
  stem.innerHTML = markBlank(escapeHtml(it.stem));
  wrap.appendChild(stem);
  const opts = document.createElement('div'); opts.className='opts';
  LT.forEach(L=>{
    if(!(L in it.options)) return;
    const btn = document.createElement('button'); btn.className='opt'; btn.dataset.lt=L;
    btn.innerHTML = `<span class="lt">(${L})</span><span>${escapeHtml(it.options[L])}</span>`;
    btn.onclick = ()=>choose(wrap, it, di, qid, L, btn);
    opts.appendChild(btn);
  });
  wrap.appendChild(opts);
  const res = document.createElement('div'); res.className='result';
  res.innerHTML = `<div class="verdict"></div><div class="expltext"></div>`;
  wrap.appendChild(res);
  const act = document.createElement('div'); act.className='actions';
  const sb = document.createElement('button'); sb.textContent='解答・解説を見る';
  sb.onclick = ()=>reveal(wrap, it, di, qid);
  act.appendChild(sb);
  wrap.appendChild(act);
  return wrap;
}
function lockOptions(wrap, correct){
  wrap.querySelectorAll('.opt').forEach(o=>{
    o.classList.add('disabled');
    if(o.dataset.lt===correct) o.classList.add('correct'); else o.classList.add('dim');
  });
}
function choose(wrap, it, di, qid, L, btn){
  if(wrap.dataset.answered==='1') return;
  wrap.dataset.answered='1';
  lockOptions(wrap, it.answer);
  const isok = (L===it.answer);
  if(!isok){ btn.classList.remove('dim'); btn.classList.add('wrong'); }
  showResult(wrap, it, isok);
  scores[di].done.add(qid); if(isok) scores[di].ok.add(qid);
  updateScore();
}
function reveal(wrap, it, di, qid){
  if(wrap.dataset.answered==='1'){ wrap.querySelector('.result').classList.add('show'); return; }
  wrap.dataset.answered='1';
  lockOptions(wrap, it.answer);
  showResult(wrap, it, null);
  scores[di].done.add(qid);
  updateScore();
}
function showResult(wrap, it, isok){
  const res = wrap.querySelector('.result');
  const v = res.querySelector('.verdict');
  if(isok===true){ v.textContent='正解！'; v.className='verdict ok'; }
  else if(isok===false){ v.textContent='不正解 — 正解は ('+it.answer+')'; v.className='verdict ng'; }
  else { v.textContent='正解は ('+it.answer+')'; v.className='verdict'; }
  res.querySelector('.expltext').innerHTML = escapeHtml(it.explanation).replace(/\n/g,'<br>');
  res.classList.add('show');
}
function showDay(i){
  current=i;
  document.querySelectorAll('.day').forEach((d,idx)=>d.classList.toggle('active', idx===i));
  document.querySelectorAll('#nav button').forEach((b,idx)=>b.classList.toggle('active', idx===i));
  updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}
function updateScore(){
  const s = scores[current]; if(!s) return;
  document.getElementById('sc-ok').textContent = s.ok.size;
  document.getElementById('sc-done').textContent = s.done.size;
  document.getElementById('sc-total').textContent = DATA[current].items.length;
}
function resetDay(){
  const di=current;
  buildContent();
  showDay(di);
}
buildNav();
buildContent();
document.getElementById('resetbtn').onclick=resetDay;
showDay(DATA.length-1);
</script>
