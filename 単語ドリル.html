<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOEIC 単語ドリル</title>
<style>
  :root{--bg:#f5f6f8;--card:#fff;--ink:#1f2430;--sub:#6b7280;--accent:#2563eb;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--star:#f59e0b;--mark:#fef3c7}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7}
  header{background:var(--card);border-bottom:1px solid var(--line);padding:14px 20px;position:sticky;top:0;z-index:5}
  header h1{margin:0;font-size:18px}
  nav{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  nav button{border:1px solid var(--line);background:#fff;border-radius:16px;padding:5px 14px;cursor:pointer;font-size:13px}
  nav button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  select{border:1px solid var(--line);border-radius:8px;padding:4px 8px;font-size:13px}
  main{max-width:760px;margin:0 auto;padding:20px}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;font-size:14px}
  th,td{border-bottom:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  th{background:#eef2ff;font-size:13px}
  .en{font-weight:600}
  .ex{color:var(--sub);font-size:13px}
  .star{cursor:pointer;color:#d1d5db;font-size:17px;user-select:none}
  .star.on{color:var(--star)}
  #card{background:var(--card);border:1px solid var(--line);border-radius:16px;min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;padding:24px;text-align:center;margin:14px 0}
  #card .big{font-size:34px;font-weight:700}
  #card .pos{color:var(--sub);font-size:14px}
  #card .back{font-size:22px;font-weight:600;color:#1e40af}
  #card .ex{margin-top:12px;font-size:14px}
  .rowbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .rowbtns button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 18px;cursor:pointer}
  .q{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin:14px 0}
  .q .stem{font-size:24px;font-weight:700;margin-bottom:4px}
  .q .pos{color:var(--sub);font-size:13px;margin-bottom:12px}
  .choices{display:grid;gap:8px}
  .choice{text-align:left;border:1px solid var(--line);background:#fafafa;border-radius:8px;padding:10px 14px;cursor:pointer;font-size:15px;font-family:inherit}
  .choice.correct{background:#dcfce7;border-color:var(--ok);font-weight:600}
  .choice.wrong{background:#fee2e2;border-color:var(--ng)}
  .fb{margin-top:10px;font-size:14px;display:none}
  .meta{color:var(--sub);font-size:13px}
  .empty{color:var(--sub);text-align:center;margin-top:60px}
  .kind{display:inline-block;font-size:11px;border-radius:10px;padding:1px 7px;border:1px solid var(--line);background:#f1f5f9;color:var(--sub);white-space:nowrap}
  .kind.ph{background:#ede9fe;border-color:#c4b5fd;color:#5b21b6}
  .en.ph{color:#5b21b6}
  #card .big.ph{font-size:26px}
  .q .stem.ph{font-size:20px}
  /* 長文タブ */
  .pwrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin-top:6px}
  .ptitle{font-size:19px;font-weight:700;margin:0 0 2px}
  .ptheme{color:var(--sub);font-size:13px;margin-bottom:12px}
  .ptext{font-size:15.5px;line-height:1.85}
  .ptext p{margin:0 0 13px}
  mark.tw{background:var(--mark);border-radius:3px;padding:0 2px;font-weight:600;color:#92400e}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 16px}
  .chip{font-size:12px;border:1px solid var(--line);border-radius:12px;padding:2px 10px;background:#f8fafc;color:var(--sub)}
  .chip.hit{background:#dcfce7;border-color:var(--ok);color:#166534}
  .chip.hit::before{content:"\2713 ";font-weight:700}
  .chip.phc{border-style:dashed}
  .pja{color:#374151;font-size:14px;white-space:pre-wrap;display:none;border-top:1px dashed var(--line);margin-top:14px;padding-top:12px}
  .pjbtn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;margin-top:12px}
  .pq{border-top:1px solid var(--line);margin-top:16px;padding-top:14px}
  .pq .stem{font-weight:600;margin-bottom:8px}
  .pq .expl{display:none;margin-top:8px;font-size:14px;color:#374151;border-top:1px dashed var(--line);padding-top:8px}
  .pq .reveal{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;margin-top:6px}
  .hublink{display:inline-block;font-size:12px;color:#6b7280;text-decoration:none;margin-bottom:6px}
  .hublink:hover{text-decoration:underline}
</style>
</head>
<body>
<header>
  <a class="hublink" id="hublink" href="/">&larr; ポータル一覧</a>
  <h1>TOEIC 単語ドリル</h1>
  <nav>
    <button id="m_list" class="active" onclick="setMode('list')">一覧</button>
    <button id="m_card" onclick="setMode('card')">カード</button>
    <button id="m_quiz" onclick="setMode('quiz')">クイズ</button>
    <button id="m_passage" onclick="setMode('passage')">長文</button>
    <select id="daySel" onchange="onRangeChange()"></select>
    <select id="typeSel" onchange="onRangeChange()">
      <option value="all">単語＋句表現</option>
      <option value="word">単語のみ</option>
      <option value="phrase">句表現のみ</option>
    </select>
  </nav>
</header>
<main id="content"><p class="empty">読み込み中…</p></main>
<script>
window.__VOCAB = [];
window.__addVocab = function(v){
  for(var i=0;i<window.__VOCAB.length;i++){ if(window.__VOCAB[i].date===v.date) return; }
  window.__VOCAB.push(v);
};
window.__PASSAGES = [];
window.__addPassage = function(p){
  for(var i=0;i<window.__PASSAGES.length;i++){ if(window.__PASSAGES[i].date===p.date) return; }
  window.__PASSAGES.push(p);
};

function loadScript(src){
  return new Promise(function(res){
    var s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=res;
    document.head.appendChild(s);
  });
}

// 単語(_all.js)と長文(_all.js)をまず1回で読み、最終日より後の分だけ個別に補完する
function probeSet(indexSrc, dayPrefix, arr, startY, startM, startD){
  return loadScript(indexSrc).then(function(){
    var last=null;
    arr.forEach(function(d){ if(!last||d.date>last) last=d.date; });
    var start=new Date(startY,startM,startD);
    if(last){ var p=last.split('-'); start=new Date(+p[0],+p[1]-1,+p[2]); start.setDate(start.getDate()+1); }
    var end=new Date(); end.setDate(end.getDate()+1);
    var ps=[];
    for(var d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
      var y=d.getFullYear(),m=('0'+(d.getMonth()+1)).slice(-2),dd=('0'+d.getDate()).slice(-2);
      ps.push(loadScript(dayPrefix+y+'-'+m+'-'+dd+'.js'));
    }
    return Promise.all(ps);
  });
}
function probe(){
  return Promise.all([
    probeSet('単語データ/_all.js','単語データ/VOCAB_',window.__VOCAB,2026,6,16),   // 2026-07-16
    probeSet('長文データ/_all.js','長文データ/PASSAGE_',window.__PASSAGES,2026,6,16) // 2026-07-16
  ]);
}

var daysData=[], passageDays=[], mode='list', cardIdx=0, cardBack=false, quizSet=[], quizIdx=0, quizOk=0;
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var WEAK={};
try{WEAK=JSON.parse(localStorage.getItem('toeic_vocab_weak')||'{}');}catch(e){WEAK={};}
function saveWeak(){try{localStorage.setItem('toeic_vocab_weak',JSON.stringify(WEAK));}catch(e){}}
function toggleWeak(w,el){ if(WEAK[w]){delete WEAK[w];el.classList.remove('on');}else{WEAK[w]=1;el.classList.add('on');} saveWeak(); }

function setMode(m){
  mode=m;
  ['list','card','quiz','passage'].forEach(function(x){document.getElementById('m_'+x).classList.toggle('active',x===m);});
  cardIdx=0;cardBack=false;
  if(m==='quiz')buildQuiz();
  render();
}

// 単語(kind:'word')と句表現(kind:'phrase')を1本の items 配列に正規化する
function buildItems(d){
  var a=[];
  (d.words||[]).forEach(function(w){var o={};for(var k in w)o[k]=w[k];o.kind='word';a.push(o);});
  (d.phrases||[]).forEach(function(p){var o={};for(var k in p)o[k]=p[k];o.kind='phrase';o.pos=o.pos||'句';a.push(o);});
  d.items=a; return d;
}
function typeOf(){var e=document.getElementById('typeSel');return e?e.value:'all';}
function filterKind(a){var t=typeOf();return t==='all'?a:a.filter(function(x){return x.kind===t;});}
function onRangeChange(){cardIdx=0;cardBack=false;if(mode==='quiz')buildQuiz();render();}

function selDates(){
  var v=document.getElementById('daySel').value;
  if(v==='all')return daysData;
  if(v==='weak')return [{date:'苦手',items:allItemsRaw().filter(function(w){return WEAK[w.en];})}];
  if(v==='review')return reviewDays();
  return daysData.filter(function(d){return d.date===v;});
}
function allItemsRaw(){var a=[];daysData.forEach(function(d){a=a.concat(d.items||[]);});return a;}
function allWords(){return filterKind(allItemsRaw());}
function reviewDays(){
  // 今日 + 1/3/7/14/30日前 の回を復習対象にする
  var t=new Date(), targets={};
  [0,1,3,7,14,30].forEach(function(n){
    var d=new Date(t);d.setDate(d.getDate()-n);
    targets[d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)]=1;
  });
  var r=daysData.filter(function(d){return targets[d.date];});
  return r.length?r:daysData.slice(-1);
}
function pool(){var a=[];selDates().forEach(function(d){a=a.concat(d.items||[]);});return filterKind(a);}

function render(){
  var c=document.getElementById('content');
  if(mode==='passage'){ renderPassage(); return; }
  if(!daysData.length){c.innerHTML='<p class="empty">まだ単語データがありません。</p>';return;}
  var ws=pool();
  if(mode==='list'){
    var nw=ws.filter(function(x){return x.kind!=='phrase';}).length, np=ws.length-nw;
    var h='<p class="meta">単語'+nw+' ／ 句表現'+np+'（計'+ws.length+'）　★をクリックすると苦手登録（クイズの「苦手」で出題）</p>';
    h+='<table><tr><th></th><th>種別</th><th>見出し</th><th>品詞</th><th>意味</th><th>例文・補足</th></tr>';
    ws.forEach(function(w){
      var ph=(w.kind==='phrase');
      h+='<tr><td><span class="star'+(WEAK[w.en]?' on':'')+'" onclick="toggleWeak(\''+esc(w.en).replace(/'/g,"\\'")+'\',this)">★</span></td>'
        +'<td><span class="kind'+(ph?' ph':'')+'">'+(ph?'句表現':'単語')+'</span></td>'
        +'<td class="en'+(ph?' ph':'')+'">'+esc(w.en)+'</td><td>'+esc(w.pos||'')+'</td><td>'+esc(w.ja)+'</td>'
        +'<td>'+esc(w.ex||'')+'<div class="ex">'+esc(w.exJa||'')+(w.note?' ／ '+esc(w.note):'')+'</div></td></tr>';
    });
    c.innerHTML=h+'</table>';
  } else if(mode==='card'){
    if(!ws.length){c.innerHTML='<p class="empty">対象の単語がありません。</p>';return;}
    if(cardIdx>=ws.length)cardIdx=0;
    var w=ws[cardIdx];
    var h='<p class="meta">'+(cardIdx+1)+' / '+ws.length+'（カードをクリックで表裏切替）</p>';
    h+='<div id="card" onclick="cardBack=!cardBack;render()">';
    if(!cardBack){ h+='<div class="big'+(w.kind==='phrase'?' ph':'')+'">'+esc(w.en)+'</div><div class="pos"><span class="kind'+(w.kind==='phrase'?' ph':'')+'">'+(w.kind==='phrase'?'句表現':'単語')+'</span> '+esc(w.pos||'')+'</div>'; }
    else{ h+='<div class="back">'+esc(w.ja)+'</div><div class="ex">'+esc(w.ex||'')+'<br>'+esc(w.exJa||'')+(w.note?'<br>'+esc(w.note):'')+'</div>'; }
    h+='</div><div class="rowbtns">'
      +'<button onclick="cardIdx=Math.max(0,cardIdx-1);cardBack=false;render()">← 前へ</button>'
      +'<button onclick="cardIdx=(cardIdx+1)%'+ws.length+';cardBack=false;render()">次へ →</button>'
      +'<button onclick="shuffleCards()">シャッフル</button></div>';
    c.innerHTML=h;
  } else {
    renderQuiz();
  }
}
var shuffled=null;
function shuffleCards(){
  selDates().forEach(function(d){if(d.items)d.items.sort(function(){return Math.random()-0.5;});});
  cardIdx=0;cardBack=false;render();
}

function buildQuiz(){
  var ws=pool().slice();
  ws.sort(function(){return Math.random()-0.5;});
  quizSet=ws.slice(0,Math.min(20,ws.length));
  quizIdx=0;quizOk=0;
}
function renderQuiz(){
  var c=document.getElementById('content');
  if(!quizSet.length){c.innerHTML='<p class="empty">対象の単語がありません。範囲を変えてください。</p>';return;}
  if(quizIdx>=quizSet.length){
    c.innerHTML='<div class="q"><div class="stem">結果: '+quizOk+' / '+quizSet.length+'</div>'
      +'<div class="rowbtns"><button onclick="buildQuiz();render()">もう一度</button></div></div>';
    return;
  }
  var w=quizSet[quizIdx];
  var base=allItemsRaw().filter(function(x){return x.en!==w.en&&x.ja!==w.ja;});
  var same=base.filter(function(x){return x.kind===w.kind;});   // 誤答は同じ種別から作る（単語の意味に句表現が混ざらないように）
  var others=(same.length>=3?same:base);
  others=others.slice();
  others.sort(function(){return Math.random()-0.5;});
  var opts=[w].concat(others.slice(0,3));
  opts.sort(function(){return Math.random()-0.5;});
  var ph=(w.kind==='phrase');
  var h='<p class="meta">'+(quizIdx+1)+' / '+quizSet.length+' ｜ 正答 '+quizOk+'</p>';
  h+='<div class="q"><div class="stem'+(ph?' ph':'')+'">'+esc(w.en)+'</div><div class="pos"><span class="kind'+(ph?' ph':'')+'">'+(ph?'句表現':'単語')+'</span> '+esc(w.pos||'')+' ｜ 意味を選んでください</div><div class="choices">';
  opts.forEach(function(o,i){h+='<button class="choice" data-ok="'+(o.en===w.en?1:0)+'">'+esc(o.ja)+'</button>';});
  h+='</div><div class="fb" id="fb"></div></div>';
  c.innerHTML=h;
  c.querySelectorAll('.choice').forEach(function(b){
    b.onclick=function(){
      if(document.getElementById('fb').style.display==='block')return;
      var ok=b.dataset.ok==='1';
      c.querySelectorAll('.choice').forEach(function(x){x.disabled=true;if(x.dataset.ok==='1')x.classList.add('correct');});
      if(ok){quizOk++;}else{b.classList.add('wrong');WEAK[w.en]=1;saveWeak();}
      var fb=document.getElementById('fb');
      fb.style.display='block';
      fb.innerHTML=(ok?'<b style="color:var(--ok)">正解</b>':'<b style="color:var(--ng)">不正解</b>（自動で苦手登録）')
        +'<br>'+esc(w.ex||'')+'<br><span class="meta">'+esc(w.exJa||'')+(w.note?' ／ '+esc(w.note):'')+'</span>'
        +'<div class="rowbtns" style="justify-content:flex-start;margin-top:8px"><button onclick="quizIdx++;render()">次の問題 →</button></div>';
    };
  });
}

// ---- 長文タブ ----
function currentPassageDate(){
  var v=document.getElementById('daySel').value;
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  if(!passageDays.length) return null;
  var _t=new Date(), _ts=_t.getFullYear()+'-'+('0'+(_t.getMonth()+1)).slice(-2)+'-'+('0'+_t.getDate()).slice(-2);
  var _av=passageDays.filter(function(x){return x.date<=_ts;}); // 未来日付は当日まで隠す
  return (_av.length? _av[_av.length-1] : passageDays[0]).date; // 全期間/苦手/復習は「今日以前の最新回」を表示
}
// カバレッジ照合キー: 見出しから最も長い語を取り出し先頭5文字で前方一致を見る
// (句表現は be / A / B / do / -ing などの記号を含むため、内容語で照合する)
function covKey(t){
  var toks=String(t).toLowerCase().replace(/-ing/g,' ').split(/[^a-z']+/).filter(function(x){return x;});
  var best='';
  toks.forEach(function(x){ if(x.length>best.length) best=x; });
  return best.slice(0,5);
}
function markPassage(text){
  // [[surface]] を目標語ハイライトに変換。段落は空行区切り。
  var html=esc(text).replace(/\[\[([^\]]+)\]\]/g,'<mark class="tw">$1</mark>');
  return html.split(/\n\s*\n/).map(function(p){return '<p>'+p.replace(/\n/g,'<br>')+'</p>';}).join('');
}
function renderPassage(){
  var c=document.getElementById('content');
  if(!passageDays.length){c.innerHTML='<p class="empty">長文データがまだありません。日次タスク(daily-toeic-vocab)で生成されます。</p>';return;}
  var date=currentPassageDate();
  var p=passageDays.filter(function(x){return x.date===date;})[0];
  var note='';
  if(!p){ p=passageDays[passageDays.length-1]; note='<p class="meta">選択した日付の長文はありません。最新回('+esc(p.date)+')を表示しています。</p>'; }
  var plain=String(p.passage).replace(/\[\[|\]\]/g,'');
  var h=note+'<div class="pwrap">';
  h+='<h2 class="ptitle">'+esc(p.title||'今日の長文')+'</h2>';
  h+='<div class="ptheme">'+esc(p.date)+(p.theme?' ／ '+esc(p.theme):'')+(p.level?' ／ '+esc(p.level)+'点レベル':'')+'</div>';
  // 使用語チェックリスト(全語カバーの確認)
  var cov=[];
  (p.words||[]).forEach(function(w){cov.push({t:w,ph:false});});
  (p.phrases||[]).forEach(function(w){cov.push({t:w,ph:true});});
  if(cov.length){
    h+='<div class="chips">';
    cov.forEach(function(it){
      var key=covKey(it.t);
      var hit=key.length>0&&plain.toLowerCase().indexOf(key)>=0;
      h+='<span class="chip'+(hit?' hit':'')+(it.ph?' phc':'')+'">'+esc(it.t)+'</span>';
    });
    h+='</div>';
  }
  h+='<div class="ptext">'+markPassage(p.passage)+'</div>';
  if(p.passageJa){
    h+='<button class="pjbtn" onclick="var e=document.getElementById(\'pja\');e.style.display=e.style.display===\'block\'?\'none\':\'block\'">全文の和訳を表示 / 隠す</button>';
    h+='<div class="pja" id="pja">'+esc(p.passageJa)+'</div>';
  }
  (p.questions||[]).forEach(function(it,qi){
    var qid='pq'+qi;
    h+='<div class="pq" id="'+qid+'"><div class="stem">Q'+(qi+1)+'. '+esc(it.q)+'</div><div class="choices">';
    it.choices.forEach(function(ch,ci){
      h+='<button class="choice" data-q="'+qid+'" data-c="'+ci+'" data-a="'+it.answer+'">'+String.fromCharCode(65+ci)+'. '+esc(ch)+'</button>';
    });
    h+='</div><button class="reveal" data-show="'+qid+'">解答・解説を見る</button>';
    h+='<div class="expl" id="'+qid+'_e">'+esc(it.expl||'')+'</div></div>';
  });
  h+='</div>';
  c.innerHTML=h;
  c.querySelectorAll('.pq .choice').forEach(function(btn){
    btn.onclick=function(){
      var box=document.getElementById(btn.dataset.q); if(box.dataset.done)return;
      box.dataset.done='1'; var ans=+btn.dataset.a;
      box.querySelectorAll('.choice').forEach(function(b){b.disabled=true;if(+b.dataset.c===ans)b.classList.add('correct');});
      if(+btn.dataset.c!==ans)btn.classList.add('wrong');
      document.getElementById(btn.dataset.q+'_e').style.display='block';
    };
  });
  c.querySelectorAll('.pq .reveal[data-show]').forEach(function(btn){
    btn.onclick=function(){
      var box=document.getElementById(btn.dataset.show);
      if(!box.dataset.done){box.dataset.done='1';box.querySelectorAll('.choice').forEach(function(b){var ans=+b.dataset.a;b.disabled=true;if(+b.dataset.c===ans)b.classList.add('correct');});}
      document.getElementById(btn.dataset.show+'_e').style.display='block';
    };
  });
}

probe().then(function(){
  daysData=window.__VOCAB.slice().sort(function(a,b){return a.date<b.date?-1:1;}).map(buildItems);
  passageDays=window.__PASSAGES.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  var sel=document.getElementById('daySel');
  var h='<option value="review">復習セット(今日+1/3/7/14/30日前)</option><option value="all">全期間</option><option value="weak">苦手のみ</option>';
  daysData.slice().reverse().forEach(function(d){h+='<option value="'+d.date+'">'+d.date+'</option>';});
  sel.innerHTML=h;
  render();
});

// ハブへの戻りリンク（ローカルで開いたときはファイルパスに切り替える）
